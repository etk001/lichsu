<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Lịch Sử</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

/* canvas */
canvas{
display:block;
width:100vw;
height:100vh;
}

/* nút mobile */
.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
pointer-events:none;
}

.btn{
width:70px;
height:70px;
border-radius:50%;
background:rgba(255,255,255,0.3);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
pointer-events:auto;
}

.left{
display:flex;
gap:10px;
margin-left:20px;
}

.right{
margin-right:20px;
}
</style>
</head>

<body>

<audio id="music" src="amthanh.mp3" loop></audio>

<canvas id="game"></canvas>

<div class="controls">
<div class="left">
<div class="btn" id="left">◀</div>
<div class="btn" id="right">▶</div>
</div>
<div class="right">
<div class="btn" id="jump">▲</div>
</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* load ảnh */
const playerImg = new Image();
playerImg.src = "nhanvat1.gif";

const maps = [
"thanhhoa.png",
"thanglong.png",
"batho.png",
"quoctugiam.png",
"thuathienhue.jpg",
"dienkinhthien.png",
"hoankiem.jpg",
"hoian.jpg",
"quangnam.jpg",
"dentho.png"
];

let mapImg = new Image();
mapImg.src = maps[Math.floor(Math.random()*maps.length)];

/* player */
let player = {
x:100,
y:300,
w:60,
h:60,
vx:0,
vy:0,
ground:300
};

/* control */
let keys = {
left:false,
right:false,
jump:false
};

/* mobile hold */
function hold(btn, key){
btn.addEventListener("touchstart",()=>keys[key]=true);
btn.addEventListener("touchend",()=>keys[key]=false);
}

hold(document.getElementById("left"),"left");
hold(document.getElementById("right"),"right");
hold(document.getElementById("jump"),"jump");

/* PC */
document.addEventListener("keydown",e=>{
if(e.key==="a") keys.left=true;
if(e.key==="d") keys.right=true;
if(e.key==="w") keys.jump=true;
});

document.addEventListener("keyup",e=>{
if(e.key==="a") keys.left=false;
if(e.key==="d") keys.right=false;
if(e.key==="w") keys.jump=false;
});

/* physics */
let gravity = 0.5;

/* scroll */
let scrollX = 0;

/* scroll object (trigger câu hỏi) */
let scrollObj = {
x:800,
y:300,
w:40,
h:40
};

let showQuestion = false;
let score = 0;

/* update */
function update(){

player.vx = 0;

if(keys.left) player.vx = -5;
if(keys.right) player.vx = 5;

if(keys.jump && player.y >= player.ground){
player.vy = -10;
}

player.vy += gravity;
player.y += player.vy;
player.x += player.vx;

if(player.y > player.ground){
player.y = player.ground;
player.vy = 0;
}

/* camera */
scrollX += player.vx;

/* va chạm scroll */
if(
player.x > scrollObj.x - scrollX &&
player.x < scrollObj.x - scrollX + scrollObj.w
){
showQuestion = true;
}

}

/* draw */
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* map */
ctx.drawImage(mapImg, -scrollX, 0, canvas.width*2, canvas.height);

/* scroll */
ctx.fillStyle="yellow";
ctx.fillRect(scrollObj.x - scrollX, scrollObj.y,40,40);

/* player */
ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

/* score */
ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Điểm: "+score,20,30);

/* câu hỏi */
if(showQuestion){
ctx.fillStyle="rgba(0,0,0,0.7)";
ctx.fillRect(200,100,400,200);

ctx.fillStyle="white";
ctx.fillText("Đây là địa danh gì?",250,180);
ctx.fillText("✔ / ✖",350,220);
}

}

/* loop */
function gameLoop(){
update();
draw();
requestAnimationFrame(gameLoop);
}

gameLoop();

/* nhạc */
document.body.addEventListener("click",()=>{
document.getElementById("music").play();
},{once:true});

</script>

</body>
</html>
