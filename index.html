<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Lịch Sử Việt Nam Pixel</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:sans-serif;
}

canvas{
display:block;
image-rendering: pixelated;
}

.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:15px;
}

button{
font-size:22px;
padding:15px;
border:none;
border-radius:10px;
background:black;
color:white;
}

.score{
position:fixed;
top:10px;
left:10px;
background:white;
padding:8px 12px;
border-radius:8px;
font-size:20px;
}
</style>
</head>

<body>

<div class="score">Điểm: <span id="score">0</span></div>

<canvas id="game"></canvas>

<div class="controls">
<button onclick="moveLeft()">◀</button>
<button onclick="jump()">▲</button>
<button onclick="moveRight()">▶</button>
</div>

<audio id="music" loop>
<source src="snaptt.me-35221248.m4a" type="audio/mp4">
</audio>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let score = 0

let player = {
x:100,
y:300,
w:40,
h:40,
vy:0,
speed:6,
jumping:false
}

const gravity = 0.7

const questions = [
"Ngô Quyền đánh bại quân nào trên sông Bạch Đằng?",
"Chiến thắng Điện Biên Phủ năm bao nhiêu?",
"Ai đọc Tuyên ngôn Độc lập 1945?",
"Nhà Trần đánh bại quân nào?",
"Thủ đô Việt Nam là gì?"
]

let gates = [
{x:600, asked:false},
{x:1200, asked:false},
{x:1800, asked:false},
{x:2400, asked:false},
{x:3000, asked:false}
]

function drawGround(){
for(let i=0;i<4000;i+=40){
ctx.fillStyle="#4CAF50"
ctx.fillRect(i,350,40,40)
}
}

function drawPlayer(){
ctx.fillStyle="#ffcc99"
ctx.fillRect(player.x,player.y,player.w,player.h)

ctx.fillStyle="red"
ctx.fillRect(player.x+8,player.y+8,24,24)
}

function drawGates(){
ctx.fillStyle="brown"
gates.forEach(g=>{
if(!g.asked){
ctx.fillRect(g.x,280,40,70)
}
})
}

function game(){
ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.save()
ctx.translate(-player.x + 150,0)

drawGround()
drawGates()
drawPlayer()

ctx.restore()

player.y += player.vy
player.vy += gravity

if(player.y > 300){
player.y = 300
player.jumping = false
}

gates.forEach((g,i)=>{
if(!g.asked && player.x > g.x-40){
g.asked = true
askQuestion(i)
}
})

requestAnimationFrame(game)
}

function moveLeft(){
player.x -= player.speed
}

function moveRight(){
player.x += player.speed
}

function jump(){
if(!player.jumping){
player.vy = -14
player.jumping = true
}
}

function askQuestion(i){
let answer = prompt(questions[i])

if(answer){
score += 5
alert("Bạn được 5 điểm!")
}

document.getElementById("score").innerText = score
}

document.addEventListener("click", () => {
let music = document.getElementById("music")
if(music) music.play().catch(()=>{})
})

game()

</script>

</body>
</html>
