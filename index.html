<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Lịch Sử FINAL</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}

/* canvas */
canvas{
position:absolute;
image-rendering:pixelated;
}

/* xoay ngang */
#rotate{
position:fixed;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
z-index:100;
}

/* control */
#controls{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px;
z-index:10;
}

.btn{
width:70px;
height:70px;
background:rgba(255,255,255,0.3);
border-radius:50%;
}
</style>
</head>

<body>

<div id="rotate">Xoay ngang để chơi</div>

<canvas id="game"></canvas>

<div id="controls">
<div>
<div class="btn" id="btnLeft"></div>
<div class="btn" id="btnRight"></div>
</div>
<div class="btn" id="btnJump"></div>
</div>

<audio id="music" src="amthanh.mp3" loop></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* FIX 16:9 */
function resize(){
let ratio=16/9;
let w=window.innerWidth;
let h=window.innerHeight;

if(w/h>ratio){
canvas.height=h;
canvas.width=h*ratio;
}else{
canvas.width=w;
canvas.height=w/ratio;
}

canvas.style.left=(w-canvas.width)/2+"px";
canvas.style.top=(h-canvas.height)/2+"px";
}
resize();
window.addEventListener("resize",resize);

/* xoay ngang */
function checkRotate(){
document.getElementById("rotate").style.display =
(window.innerHeight>window.innerWidth)?"flex":"none";
}
checkRotate();
window.addEventListener("resize",checkRotate);

/* load ảnh */
const playerImg=new Image();
playerImg.src="nhanvat1.gif";

const mapImg=new Image();
mapImg.src="thanglong.png";

/* kiểm tra load */
let loaded=false;
mapImg.onload=()=>loaded=true;

/* player */
let player={
x:100,y:300,vx:0,vy:0,ground:300
};

let gravity=0.8;
let scrollX=0;

/* control state */
let control={
left:false,
right:false,
jump:false
};

/* FIX TOUCH */
function bind(btn,key){
btn.addEventListener("touchstart",()=>control[key]=true);
btn.addEventListener("touchend",()=>control[key]=false);

btn.addEventListener("mousedown",()=>control[key]=true);
btn.addEventListener("mouseup",()=>control[key]=false);
}

bind(document.getElementById("btnLeft"),"left");
bind(document.getElementById("btnRight"),"right");
bind(document.getElementById("btnJump"),"jump");

/* loop */
function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* FIX màn đen */
if(!loaded || !playerImg.complete){
ctx.fillStyle="white";
ctx.fillText("Loading...",50,50);
requestAnimationFrame(loop);
return;
}

/* map */
ctx.drawImage(mapImg,-scrollX,0,canvas.width,canvas.height);

/* movement */
player.vx=0;
if(control.left) player.vx=-5;
if(control.right) player.vx=5;

if(control.jump && player.y>=player.ground){
player.vy=-15;
}

player.vy+=gravity;
player.y+=player.vy;
player.x+=player.vx;

if(player.y>player.ground){
player.y=player.ground;
player.vy=0;
}

/* camera */
scrollX+=player.vx;

/* player */
ctx.drawImage(playerImg,player.x,player.y,80,80);

/* debug text */
ctx.fillStyle="white";
ctx.fillText("OK",20,20);

requestAnimationFrame(loop);
}
loop();

/* music */
document.body.addEventListener("click",()=>{
document.getElementById("music").play();
},{once:true});

</script>

</body>
</html>
