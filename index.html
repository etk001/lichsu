<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
background:black;
overflow:hidden;
touch-action:none;
}

canvas{
position:absolute;
image-rendering:pixelated;
}

/* xoay ngang */
#rotate{
position:fixed;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
z-index:100;
}

/* menu */
#menu{
position:fixed;
width:100%;
height:100%;
background:url('manhinhchinh.png') center/cover;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:200;
}

.char{
width:90px;
margin:10px;
border:3px solid white;
}

/* control */
#controls{
position:fixed;
bottom:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:20px;
}

.btn{
width:70px;
height:70px;
background:rgba(255,255,255,0.3);
border-radius:50%;
}
</style>
</head>

<body>

<div id="rotate">Xoay ngang để chơi</div>

<div id="menu">
<h2 style="color:white">Chọn nhân vật</h2>
<img src="play1.png" class="char" onclick="choose(1)">
<img src="play2.png" class="char" onclick="choose(2)">
<button onclick="start()">Bắt đầu</button>
</div>

<canvas id="game"></canvas>

<div id="controls">
<div>
<div class="btn" id="left"></div>
<div class="btn" id="right"></div>
</div>
<div class="btn" id="jump"></div>
</div>

<audio id="music" src="amthanh.mp3" loop></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* ===== RESIZE ===== */
function resize(){
let ratio=16/9;
let w=innerWidth,h=innerHeight;

if(w/h>ratio){
canvas.height=h;
canvas.width=h*ratio;
}else{
canvas.width=w;
canvas.height=w/ratio;
}

canvas.style.left=(w-canvas.width)/2+"px";
canvas.style.top=(h-canvas.height)/2+"px";
}
resize();
addEventListener("resize",resize);

/* ===== XOAY ===== */
function checkRotate(){
rotate.style.display=(innerHeight>innerWidth)?"flex":"none";
}
checkRotate();
addEventListener("resize",checkRotate);

/* ===== PLAYER ===== */
let player={
x:100,y:0,
vx:0,vy:0,
w:60,h:60,
onGround:false,
dir:1
};

/* ===== SPRITE ===== */
let playerImg=new Image();
let frame=0;
let totalFrame=4;
let frameSpeed=0.3;

function choose(n){
playerImg.src = (n==1)?"play1.png":"play2.png";
}

/* ===== CONTROL ===== */
let c={left:false,right:false,jump:false};

function bind(id,key){
let b=document.getElementById(id);
b.ontouchstart=()=>c[key]=true;
b.ontouchend=()=>c[key]=false;
b.onmousedown=()=>c[key]=true;
b.onmouseup=()=>c[key]=false;
}
bind("left","left");
bind("right","right");
bind("jump","jump");

/* ===== ÂM ===== */
let jumpSound=new Audio("nhay.mp3");

/* ===== MAP ===== */
let mapImg=new Image();
mapImg.src="thanglong.png";

/* ===== TRỤC (CHECKPOINT) ===== */
let scrollImg=new Image();
scrollImg.src="truc.png";
let checkpoint=800;

/* ===== PLATFORM PARKOUR ===== */
let platforms=[
{x:250,y:350,w:120,h:20},
{x:400,y:300,w:120,h:20},
{x:550,y:250,w:120,h:20},
{x:700,y:200,w:120,h:20},
{x:850,y:250,w:120,h:20}
];

/* ===== GAI ===== */
let spikes=[
{x:600,y:400,w:60,h:20}
];

/* ===== GAME ===== */
let gravity=0.8;
let scrollX=0;

function ground(){
return canvas.height-60;
}

/* DRAW PLAYER */
function drawPlayer(){
let fw = playerImg.width / totalFrame;

if(player.vx!=0){
frame+=frameSpeed;
if(frame>=totalFrame) frame=0;
}else frame=0;

let fx=Math.floor(frame)*fw;

ctx.save();
ctx.translate(player.x,player.y);

if(player.dir==-1){
ctx.scale(-1,1);
ctx.drawImage(playerImg,fx,0,fw,playerImg.height,-player.w,0,player.w,player.h);
}else{
ctx.drawImage(playerImg,fx,0,fw,playerImg.height,0,0,player.w,player.h);
}

ctx.restore();
}

/* LOOP */
function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

/* MAP FIX KHÔNG MÉO */
let mapWidth = canvas.height*(mapImg.width/mapImg.height);
ctx.drawImage(mapImg,-scrollX,0,mapWidth,canvas.height);

/* MOVE */
player.vx=0;
if(c.left){player.vx=-5;player.dir=-1;}
if(c.right){player.vx=5;player.dir=1;}

if(c.jump && player.onGround){
player.vy=-14;
player.onGround=false;
jumpSound.play();
}

player.vy+=gravity;
player.x+=player.vx;
player.y+=player.vy;

/* GROUND */
if(player.y+player.h>=ground()){
player.y=ground()-player.h;
player.vy=0;
player.onGround=true;
}

/* PLATFORM */
platforms.forEach(p=>{
let px=p.x-scrollX;

if(player.x+player.w>px &&
player.x<px+p.w &&
player.y+player.h>p.y &&
player.y+player.h<p.y+25 &&
player.vy>=0){
player.y=p.y-player.h;
player.vy=0;
player.onGround=true;
}
});

/* SPIKE */
spikes.forEach(s=>{
let sx=s.x-scrollX;
ctx.fillStyle="red";
ctx.fillRect(sx,s.y,s.w,s.h);

if(player.x+player.w>sx && player.x<sx+s.w && player.y+player.h>ground()-10){
reset();
}
});

/* CAMERA */
scrollX+=player.vx;

/* DRAW PLATFORM */
ctx.fillStyle="green";
platforms.forEach(p=>{
ctx.fillRect(p.x-scrollX,p.y,p.w,p.h);
});

/* TRỤC */
ctx.drawImage(scrollImg,checkpoint-scrollX,ground()-60,60,60);

if(player.x > checkpoint-scrollX-20){
alert("Mở câu hỏi!");
}

/* PLAYER */
drawPlayer();

/* UI */
ctx.fillStyle="white";
ctx.fillText("Parkour PRO",20,20);

requestAnimationFrame(loop);
}

/* RESET */
function reset(){
player.x=100;
player.y=0;
scrollX=0;
}

/* START */
function start(){
menu.style.display="none";
music.play().catch(()=>{});
loop();
}
</script>

</body>
</html>
