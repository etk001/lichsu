<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch Sử Việt Nam Pixel</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:sans-serif;
}

canvas{
display:block;
image-rendering: pixelated;
}

.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:15px;
}

button{
font-size:22px;
padding:14px 20px;
border-radius:10px;
border:none;
background:#222;
color:white;
}

.score{
position:fixed;
top:10px;
left:10px;
font-size:20px;
background:white;
padding:6px 12px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="score">Điểm: <span id="score">0</span></div>
<canvas id="game"></canvas>

<div class="controls">
<button onclick="left()">◀</button>
<button onclick="jump()">▲</button>
<button onclick="right()">▶</button>
</div>

<script>
const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let score = 0

let player = {
x:100,
y:300,
w:50,
h:50,
vy:0,
speed:6,
jump:false
}

let gates = [
{ x:800, asked:false },
{ x:1400, asked:false },
{ x:2000, asked:false },
{ x:2600, asked:false },
{ x:3200, asked:false }
]

const gravity = 0.7

function drawPixelGround(){
for(let i=0;i<canvas.width;i+=40){
ctx.fillStyle="#4CAF50"
ctx.fillRect(i,350,40,40)

ctx.fillStyle="#3e8e41"
ctx.fillRect(i,370,40,20)
}
}

function drawMountains(){
ctx.fillStyle="#6b8e23"
ctx.fillRect(400,260,120,90)
ctx.fillRect(700,240,140,110)
}

function drawPlayer(){
ctx.fillStyle="#ffcc99"
ctx.fillRect(player.x,player.y,player.w,player.h)

ctx.fillStyle="red"
ctx.fillRect(player.x+10,player.y+10,30,30)
}

function drawGate(){
ctx.fillStyle="brown"
ctx.fillRect(gate.x,gate.y,gate.w,gate.h)

ctx.fillStyle="yellow"
ctx.fillRect(gate.x+10,gate.y+10,40,20)
}

function game(){
ctx.clearRect(0,0,canvas.width,canvas.height)

drawMountains()
drawPixelGround()
drawGate()
drawPlayer()

player.y += player.vy
player.vy += gravity

if(player.y > 300){
player.y = 300
player.jump=false
}

if(gate.active && player.x + player.w > gate.x){
gate.active = false
askQuestion()
}

requestAnimationFrame(game)
}

function left(){
player.x -= player.speed
}

function right(){
player.x += player.speed
}

function jump(){
if(!player.jump){
player.vy = -14
player.jump = true
}
}

function askQuestion(){
let q = prompt("Chiến thắng Bạch Đằng năm 938 do ai lãnh đạo?")

if(q && q.toLowerCase().includes("ngô quyền")){
score += 5
alert("Đúng! +5 điểm")
}else{
alert("Sai rồi")
}

document.getElementById("score").innerText = score
}

game()
</script>

</body>
</html>
