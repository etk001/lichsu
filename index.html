<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch Sử Việt Nam Pixel</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

#controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:20px;
}

.btn{
width:70px;
height:70px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}
</style>
</head>

<body>

<div id="controls">
<div>
<div class="btn" id="left">◀</div>
<div class="btn" id="right">▶</div>
</div>
<div class="btn" id="jump">▲</div>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_3c2f0db1f2.mp3">
</audio>

<script>

let left=false
let right=false
let jump=false

const questions=[
"Ngô Quyền đánh thắng trên sông nào?",
"Chiến thắng Điện Biên Phủ năm?",
"Thủ đô Việt Nam?",
"Việt Nam thống nhất năm?",
"Ai đọc Tuyên ngôn độc lập?"
]

let q=0

function ask(){
alert(questions[q])
q++

if(q>=5){
alert("Hoàn thành màn!")
location.reload()
}
}

document.getElementById("left").ontouchstart=()=>left=true
document.getElementById("left").ontouchend=()=>left=false

document.getElementById("right").ontouchstart=()=>right=true
document.getElementById("right").ontouchend=()=>right=false

document.getElementById("jump").ontouchstart=()=>jump=true

const config={
type:Phaser.AUTO,
width:window.innerWidth,
height:window.innerHeight,
physics:{
default:"arcade",
arcade:{gravity:{y:800}}
},
scene:{preload,create,update}
}

let player
let platforms
let gates

new Phaser.Game(config)

function preload(){

this.load.image("sky","https://labs.phaser.io/assets/skies/sky4.png")
this.load.image("ground","https://labs.phaser.io/assets/sprites/platform.png")
this.load.image("player","https://labs.phaser.io/assets/sprites/phaser-dude.png")
this.load.image("gate","https://labs.phaser.io/assets/sprites/block.png")

}

function create(){

document.getElementById("music").play()

this.add.image(400,200,"sky")

platforms=this.physics.add.staticGroup()

for(let i=0;i<20;i++){
platforms.create(i*200,650,"ground").setScale(0.6).refreshBody()
}

player=this.physics.add.sprite(100,500,"player")
player.setCollideWorldBounds(true)

this.physics.add.collider(player,platforms)

gates=this.physics.add.group()

for(let i=1;i<=5;i++){
gates.create(i*700,500,"gate")
}

this.physics.add.overlap(player,gates,(p,g)=>{
g.destroy()
ask()
})

}

function update(){

if(left){
player.setVelocityX(-220)
}
else if(right){
player.setVelocityX(220)
}
else{
player.setVelocityX(0)
}

if(jump && player.body.touching.down){
player.setVelocityY(-500)
jump=false
}

}

</script>
</body>
</html>
