<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
overflow:hidden;
background:black;
touch-action:none;
}

/* canvas full */
canvas{
position:absolute;
width:100vw;
height:100vh;
image-rendering:pixelated;
}

/* xoay */
#rotate{
position:fixed;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
z-index:100;
}

/* menu */
#menu{
position:fixed;
width:100%;
height:100%;
background:url('manhinhchinh.png') center/cover;
display:flex;
flex-direction:column;
justify-content:flex-end;
z-index:200;
}

/* chọn nhân vật */
#chars{
display:flex;
overflow-x:auto;
padding:20px;
}

.char{
width:80px;
margin:10px;
border:3px solid white;
flex-shrink:0;
}

/* control */
#controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
z-index:50;
}

.btn{
width:70px;
height:70px;
background:rgba(255,255,255,0.3);
border-radius:50%;
}

#leftGroup{
display:flex;
gap:10px;
}
</style>
</head>

<body>

<div id="rotate">Xoay ngang để chơi</div>

<div id="menu">
<div id="chars"></div>
<button onclick="start()">Bắt đầu</button>
</div>

<canvas id="game"></canvas>

<div id="controls">
<div id="leftGroup">
<div class="btn" id="left"></div>
<div class="btn" id="right"></div>
</div>
<div class="btn" id="jump"></div>
</div>

<audio id="music" src="amthanh.mp3" loop></audio>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

/* ===== FULL MOBILE ===== */
function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

/* ===== XOAY ===== */
function checkRotate(){
rotate.style.display=(innerHeight>innerWidth)?"flex":"none";
}
checkRotate();
addEventListener("resize",checkRotate);

/* ===== NHÂN VẬT ===== */
let playerImg=new Image();
let selected=1;

for(let i=1;i<=10;i++){
let img=document.createElement("img");
img.src="play"+i+".png";
img.className="char";
img.onclick=()=>{selected=i;};
chars.appendChild(img);
}

/* ===== PLAYER ===== */
let player={
x:100,y:0,
vx:0,vy:0,
w:60,h:60,
onGround:false,
dir:1
};

/* ===== MAP ===== */
let mapImg=new Image();
let mapW=0;

function loadMap(){
let i=Math.floor(Math.random()*10)+1;
mapImg.src="map"+i+".png";
}

/* ===== TRỤC ===== */
let scrollImg=new Image();
scrollImg.src="truc.png";

/* ===== PLATFORM PARKOUR (CHUẨN) ===== */
let platforms=[];

function createPlatforms(){
platforms=[];

/* tạo đường đi dạng bậc thang (NHẢY ĐƯỢC) */
let baseY = ground()-80;

platforms = [
{x:200,y:baseY,w:120,h:20},
{x:350,y:baseY-80,w:120,h:20},
{x:500,y:baseY-40,w:120,h:20},
{x:650,y:baseY-120,w:120,h:20},
{x:800,y:baseY-60,w:120,h:20},
{x:950,y:baseY-140,w:120,h:20},
{x:1100,y:baseY-80,w:120,h:20}
];
}

/* ===== TRỤC ĐẶT CUỐI ===== */
function getScrollPos(){
let last = platforms[platforms.length-1];
return {x:last.x, y:last.y-80};
}

/* ===== CONTROL ===== */
let c={left:false,right:false,jump:false};

function bind(id,key){
let b=document.getElementById(id);

b.ontouchstart=(e)=>{e.preventDefault();c[key]=true;}
b.ontouchend=(e)=>{e.preventDefault();c[key]=false;}

b.onmousedown=()=>c[key]=true;
b.onmouseup=()=>c[key]=false;
}

bind("left","left");
bind("right","right");
bind("jump","jump");

/* ===== GAME ===== */
let gravity=0.7;
let scrollX=0;

function ground(){
return canvas.height-50;
}

/* ===== LOOP ===== */
function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

/* ===== MAP LẶP KHÔNG BAO GIỜ ĐEN ===== */
if(mapImg.width){
let ratio = mapImg.width/mapImg.height;
mapW = canvas.height*ratio;

for(let i=-1;i<3;i++){
ctx.drawImage(
mapImg,
(i*mapW)-(scrollX%mapW),
0,
mapW,
canvas.height
);
}
}

/* ===== MOVE ===== */
player.vx=0;
if(c.left){player.vx=-5;player.dir=-1;}
if(c.right){player.vx=5;player.dir=1;}

if(c.jump && player.onGround){
player.vy=-16;
player.onGround=false;
new Audio("nhay.mp3").play();
}

player.vy+=gravity;
player.x+=player.vx;
player.y+=player.vy;

/* ===== GROUND ===== */
if(player.y+player.h>=ground()){
player.y=ground()-player.h;
player.vy=0;
player.onGround=true;
}

/* ===== PLATFORM ===== */
platforms.forEach(p=>{
let px=p.x-scrollX;

if(player.x+player.w>px &&
player.x<px+p.w &&
player.y+player.h>p.y &&
player.y+player.h<p.y+25 &&
player.vy>=0){
player.y=p.y-player.h;
player.vy=0;
player.onGround=true;
}
});

/* ===== CAMERA ===== */
scrollX+=player.vx;

/* ===== DRAW PLATFORM ===== */
ctx.fillStyle="green";
platforms.forEach(p=>{
ctx.fillRect(p.x-scrollX,p.y,p.w,p.h);
});

/* ===== TRỤC ===== */
let sp=getScrollPos();
ctx.drawImage(scrollImg,sp.x-scrollX,sp.y,60,60);

/* ===== PLAYER ===== */
ctx.save();
if(player.dir==-1){
ctx.scale(-1,1);
ctx.drawImage(playerImg,-player.x-player.w,player.y,player.w,player.h);
}else{
ctx.drawImage(playerImg,player.x,player.y,player.w,player.h);
}
ctx.restore();

requestAnimationFrame(loop);
}

/* ===== START ===== */
function start(){
menu.style.display="none";
playerImg.src="play"+selected+".png";

loadMap();
createPlatforms();

music.play().catch(()=>{});
loop();
}
</script>

</body>
</html>
