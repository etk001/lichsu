
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game Lịch Sử Pixel</title>

<style>
body{
background:#111827;
color:white;
font-family:Arial;
text-align:center;
padding-top:100px;
}

button{
padding:14px 24px;
font-size:18px;
margin:10px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
cursor:pointer;
}

button:hover{
background:#dc2626;
}

#game{
display:none;
}

</style>
</head>

<body>

<h1>Pixel History Challenge</h1>

<button id="start">Bắt đầu chơi</button>

<div id="game">
<h2 id="question"></h2>
<div id="answers"></div>
</div>

<script>

const startBtn = document.getElementById("start");
const game = document.getElementById("game");
const questionText = document.getElementById("question");
const answersBox = document.getElementById("answers");

const questions = [
{
question:"Ai đọc Tuyên ngôn Độc lập năm 1945?",
answers:["Hồ Chí Minh","Võ Nguyên Giáp","Ngô Quyền","Quang Trung"],
correct:0
},
{
question:"Chiến thắng Điện Biên Phủ diễn ra năm nào?",
answers:["1950","1954","1965","1975"],
correct:1
},
{
question:"Trận Bạch Đằng nổi tiếng do ai lãnh đạo?",
answers:["Ngô Quyền","Lê Lợi","Trần Nhân Tông","Gia Long"],
correct:0
}
];

let current = 0;

startBtn.onclick = function(){
startBtn.style.display = "none";
game.style.display = "block";
loadQuestion();
};

function loadQuestion(){
let q = questions[current];
questionText.innerText = q.question;

answersBox.innerHTML = "";

q.answers.forEach((ans,i)=>{
let btn = document.createElement("button");
btn.innerText = ans;
btn.onclick = function(){
checkAnswer(i);
};
answersBox.appendChild(btn);
});
}

function checkAnswer(i){
if(i === questions[current].correct){
alert("Đúng!");
}else{
alert("Sai!");
}

current++;

if(current < questions.length){
loadQuestion();
}else{
questionText.innerText = "Bạn đã hoàn thành game!";
answersBox.innerHTML = "";
}
}

</script>

</body>
</html>
