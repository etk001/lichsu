<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
touch-action:none;
}

canvas{
position:absolute;
width:100vw;
height:100vh;
image-rendering:pixelated;
}

/* MENU */
#menu{
position:fixed;
width:100%;
height:100%;
background:url('manhinhchinh.png') center/cover;
display:flex;
flex-direction:column;
justify-content:flex-end;
z-index:100;
}

#chars{
display:flex;
overflow-x:auto;
padding:20px;
}

.char{
width:80px;
margin:10px;
border:3px solid white;
}

/* JOYSTICK */
#joystick{
position:fixed;
bottom:30px;
left:30px;
width:120px;
height:120px;
background:rgba(255,255,255,0.1);
border-radius:50%;
}

#stick{
width:60px;
height:60px;
background:rgba(255,255,255,0.4);
border-radius:50%;
position:absolute;
left:30px;
top:30px;
}

/* BUTTON */
#jump,#dash{
position:fixed;
right:30px;
width:70px;
height:70px;
border-radius:50%;
background:rgba(255,255,255,0.3);
}

#jump{ bottom:120px; }
#dash{ bottom:30px; }

/* QUIZ */
#quiz{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fff8dc;
padding:20px;
border-radius:15px;
display:none;
z-index:200;
}
</style>
</head>

<body>

<div id="menu">
<input id="playerName" placeholder="Nhập tên">
<div id="chars"></div>
<button onclick="start()">Bắt đầu</button>
</div>

<canvas id="game"></canvas>

<div id="joystick"><div id="stick"></div></div>
<div id="jump"></div>
<div id="dash"></div>

<div id="quiz"></div>

<audio id="music" src="amthanh.mp3" loop></audio>

<script>
const canvas=game;
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
onresize=resize;

/* PLAYER */
let player={x:100,y:0,vx:0,vy:0,w:60,h:60,onGround:false,dir:1};
let playerImg=new Image();
let selected=1;
let level=1;

/* CHỌN NHÂN VẬT */
for(let i=1;i<=10;i++){
let img=document.createElement("img");
img.src="play"+i+".png";
img.className="char";
img.onclick=()=>selected=i;
chars.appendChild(img);
}

/* JOYSTICK */
let joyX=0;

joystick.ontouchmove=e=>{
let t=e.touches[0];
let r=joystick.getBoundingClientRect();
let x=t.clientX-r.left-60;
joyX=Math.max(-1,Math.min(1,x/40));
stick.style.left=(30+joyX*30)+"px";
};

joystick.ontouchend=()=>{
joyX=0;
stick.style.left="30px";
};

/* CONTROL */
let jumpBtn=jump;
let dashBtn=dash;

let jumping=false,dashing=false;

jumpBtn.ontouchstart=()=>jumping=true;
jumpBtn.ontouchend=()=>jumping=false;

dashBtn.ontouchstart=()=>dashing=true;
dashBtn.ontouchend=()=>dashing=false;

/* MAP */
let mapImg=new Image();
let scrollImg=new Image();
scrollImg.src="truc.png";
let scrollX=0;

/* QUESTIONS */
let questions=[
{q:"Thăng Long là gì?",a:["Hà Nội","Huế","Đà Nẵng","Cần Thơ"],c:0},
{q:"Lê Lợi ở đâu?",a:["Thanh Hóa","Huế","HN","SG"],c:0}
];
let currentQ;

/* PLATFORM */
let platforms=[];

function createPlatforms(){
platforms=[];
let x=200,y=canvas.height-100;

for(let i=0;i<6+level;i++){
y-=50+Math.random()*level*10;
if(y<100)y=100;

platforms.push({x:x,y:y,w:120,h:20});
x+=140+level*20;
}
}

/* LOAD MAP */
function loadMap(){
let i=Math.floor(Math.random()*10)+1;
mapImg.src="map"+i+".png";
currentQ=questions[Math.floor(Math.random()*questions.length)];
createPlatforms();
reset();
}

/* RESET */
function reset(){
player.x=100;
player.y=0;
scrollX=0;
}

/* QUIZ */
function showQuiz(){
quiz.style.display="block";
quiz.innerHTML="<h3>"+currentQ.q+"</h3>";

currentQ.a.forEach((ans,i)=>{
quiz.innerHTML+=`<button onclick="answer(${i})">${ans}</button><br>`;
});
}

function answer(i){
quiz.style.display="none";

if(i==currentQ.c){
new Audio("dung.mp3").play();
level++;
loadMap();
}else{
new Audio("sai.mp3").play();
reset();
}
}

/* LOOP */
function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

/* MAP LOOP */
if(mapImg.width){
let ratio=mapImg.width/mapImg.height;
let mapW=canvas.height*ratio;

for(let i=-1;i<3;i++){
ctx.drawImage(mapImg,(i*mapW)-(scrollX%mapW),0,mapW,canvas.height);
}
}

/* MOVE */
player.vx=joyX*6;
if(dashing)player.vx*=2;

if(joyX<0)player.dir=-1;
if(joyX>0)player.dir=1;

if(jumping && player.onGround){
player.vy=-16;
player.onGround=false;
new Audio("nhay.mp3").play();
}

player.vy+=0.7;
player.x+=player.vx;
player.y+=player.vy;

/* FALL DIE */
if(player.y>canvas.height){
reset();
}

/* GROUND */
if(player.y+player.h>=canvas.height-50){
player.y=canvas.height-50-player.h;
player.vy=0;
player.onGround=true;
}

/* PLATFORM + LEO */
platforms.forEach(p=>{
let px=p.x-scrollX;

if(player.x+player.w>px &&
player.x<px+p.w &&
player.y+player.h>p.y &&
player.y+player.h<p.y+30 &&
player.vy>=0){
player.y=p.y-player.h;
player.vy=0;
player.onGround=true;
}

/* leo mép */
if(player.x+player.w>px &&
player.x<px+10 &&
player.y+player.h>p.y-20 &&
player.y<p.y){
player.y=p.y-player.h;
}
});

/* CAMERA */
scrollX+=player.vx;

/* PLATFORM */
ctx.fillStyle="green";
platforms.forEach(p=>{
ctx.fillRect(p.x-scrollX,p.y,p.w,p.h);
});

/* TRỤC */
let last=platforms[platforms.length-1];
let sx=last.x, sy=last.y-80;

ctx.shadowColor="yellow";
ctx.shadowBlur=20;
ctx.drawImage(scrollImg,sx-scrollX,sy,60,60);
ctx.shadowBlur=0;

/* CHẠM TRỤC */
if(player.x+player.w>sx-scrollX &&
player.x<sx-scrollX+60 &&
player.y+player.h>sy){
showQuiz();
}

/* PLAYER */
ctx.save();
if(player.dir==-1){
ctx.scale(-1,1);
ctx.drawImage(playerImg,-player.x-player.w,player.y,player.w,player.h);
}else{
ctx.drawImage(playerImg,player.x,player.y,player.w,player.h);
}
ctx.restore();

/* HUD */
ctx.fillStyle="white";
ctx.fillText("Tên: "+playerName.value,20,30);
ctx.fillText("Level: "+level,20,50);

requestAnimationFrame(loop);
}

/* START */
function start(){
playerImg.src="play"+selected+".png";
menu.style.display="none";
music.play().catch(()=>{});
loadMap();
loop();
}
</script>

</body>
</html>
