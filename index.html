<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch Sử Việt Nam Pixel</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#6ec6ff;
overflow:hidden;
}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

#questionBox{
display:none;
position:absolute;
bottom:0;
left:0;
width:100%;
background:white;
padding:20px;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}
</style>
</head>

<body>

<div id="menu">
<h2>Lịch Sử Việt Nam Pixel</h2>
<input id="name" placeholder="Nhập tên"><br><br>

<button onclick="selectHero('hero')">Anh hùng</button>
<button onclick="selectHero('student')">Áo dài</button><br><br>

<button onclick="startGame()">Bắt đầu</button>
</div>

<div id="questionBox">
<div id="questionText"></div>
<div id="answers"></div>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3c2f0db1f2.mp3">
</audio>

<script>

let playerType="hero";
let score=0;
let questionIndex=0;
let sceneRef;

const questions=[
{
q:"Ai lãnh đạo trận Bạch Đằng?",
a:["Ngô Quyền","Lê Lợi","Quang Trung","Gia Long"],
correct:0
},
{
q:"Điện Biên Phủ năm nào?",
a:["1950","1954","1968","1975"],
correct:1
},
{
q:"Ai đọc Tuyên ngôn Độc lập?",
a:["Hồ Chí Minh","Võ Nguyên Giáp","Phạm Văn Đồng","Trường Chinh"],
correct:0
},
{
q:"Việt Nam thống nhất năm nào?",
a:["1973","1975","1980","1990"],
correct:1
},
{
q:"Thủ đô Việt Nam là?",
a:["Huế","Hà Nội","Đà Nẵng","Sài Gòn"],
correct:1
}
];

function selectHero(type){
playerType=type;
}

function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("music").play();
initGame();
}

function showQuestion(){
let box=document.getElementById("questionBox");
box.style.display="block";

let q=questions[questionIndex];

document.getElementById("questionText").innerText=q.q;

let answersHTML="";
q.a.forEach((ans,i)=>{
answersHTML+=`<button onclick="answer(${i})">${ans}</button>`;
});

document.getElementById("answers").innerHTML=answersHTML;
}

function answer(i){
let q=questions[questionIndex];

if(i===q.correct){
score++;
}

questionIndex++;

document.getElementById("questionBox").style.display="none";

if(questionIndex>=questions.length){
alert("Hoàn thành!\nĐiểm: "+score+"/5");
location.reload();
}
}

function initGame(){

const config={
type:Phaser.AUTO,
width:window.innerWidth,
height:window.innerHeight,
physics:{
default:"arcade",
arcade:{gravity:{y:600}}
},
scene:{preload,create,update}
};

let player;
let cursors;
let gates;

new Phaser.Game(config);

function preload(){
this.load.image("ground","https://labs.phaser.io/assets/sprites/platform.png");
this.load.image("gate","https://labs.phaser.io/assets/sprites/block.png");

if(playerType==="hero"){
this.load.image("player","https://labs.phaser.io/assets/sprites/phaser-dude.png");
}else{
this.load.image("player","https://labs.phaser.io/assets/sprites/mushroom2.png");
}
}

function create(){

sceneRef=this;

let platforms=this.physics.add.staticGroup();

for(let i=0;i<15;i++){
platforms.create(i*300,650,"ground").setScale(0.6).refreshBody();
}

player=this.physics.add.sprite(100,500,"player");

this.physics.add.collider(player,platforms);

cursors=this.input.keyboard.createCursorKeys();

gates=this.physics.add.group();

for(let i=1;i<=5;i++){
gates.create(i*700,500,"gate");
}

this.physics.add.overlap(player,gates,(player,gate)=>{
gate.destroy();
showQuestion();
});

}

function update(){

if(cursors.left.isDown){
player.setVelocityX(-200);
}else if(cursors.right.isDown){
player.setVelocityX(200);
}else{
player.setVelocityX(0);
}

if(cursors.up.isDown && player.body.touching.down){
player.setVelocityY(-400);
}

}

}

</script>

</body>
</html>
