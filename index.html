<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Lịch Sử</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
margin:auto;
background:black;
image-rendering: pixelated;
}

#startScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

#controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:20px;
}

.btn{
width:90px;
height:90px;
background:rgba(255,255,255,0.2);
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:white;
}

#score{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:22px;
}
</style>
</head>

<body>

<div id="startScreen">

<img src="thongbao.png" width="400"><br>

<input id="playerName" placeholder="Tên người chơi"><br><br>

Chọn nhân vật<br><br>

<button onclick="selectChar(1)">Nhân vật Nam</button>
<button onclick="selectChar(2)">Nhân vật Nữ</button><br><br>

<button onclick="startGame()">Bắt đầu</button>

</div>

<div id="score">Điểm: 0</div>

<canvas id="game" width="1280" height="720"></canvas>

<div id="controls">
<div>
<div class="btn" id="left">◀</div>
<div class="btn" id="right">▶</div>
</div>
<div class="btn" id="jump">▲</div>
</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

const maps = [
"thanhhoa.png",
"thanglong.png",
"batho.png",
"quoctugiam.png",
"thuathienhue.jpg",
"dienkinhthien.png",
"hoankiem.jpg",
"hoian.jpg",
"quangnam.jpg",
"dentho.png"
]

const questions = [
{
q:"Lê Thánh Tông thuộc triều đại nào?",
a:["Nhà Lý","Nhà Lê","Nhà Trần"],
correct:1
},
{
q:"Văn Miếu Quốc Tử Giám nằm ở đâu?",
a:["Huế","Hà Nội","Quảng Nam"],
correct:1
},
{
q:"Hồ Hoàn Kiếm thuộc thành phố nào?",
a:["Huế","Hà Nội","Thanh Hóa"],
correct:1
},
{
q:"Hội An thuộc tỉnh nào?",
a:["Quảng Nam","Huế","Nghệ An"],
correct:0
},
{
q:"Kinh thành Huế nằm ở đâu?",
a:["Huế","Hà Nội","Đà Nẵng"],
correct:0
},
{
q:"Điện Kính Thiên nằm ở đâu?",
a:["Thăng Long","Huế","Hội An"],
correct:0
},
{
q:"Thanh Hóa nổi tiếng với triều đại nào?",
a:["Nhà Lê","Nhà Nguyễn","Nhà Lý"],
correct:0
},
{
q:"Bà Triệu nổi tiếng ở đâu?",
a:["Thanh Hóa","Huế","Hà Nội"],
correct:0
},
{
q:"Thăng Long là tên cũ của?",
a:["Hà Nội","Huế","Quảng Nam"],
correct:0
},
{
q:"Đền thờ vua thường gọi là?",
a:["Miếu","Đình","Đền"],
correct:2
}
]

let mapIndex = Math.floor(Math.random()*maps.length)

const mapImg = new Image()
mapImg.src = maps[mapIndex]

const playerImg = new Image()

let selectedChar = 1

function selectChar(n){
selectedChar = n
}

const scrollImg = new Image()
scrollImg.src = "thongbao.png"

const music = new Audio("amthanh.mp3")
music.loop = true

let score = 0

let player = {
x:200,
y:500,
vx:0,
vy:0,
jump:false
}

let scroll = {
x:900,
y:520,
taken:false
}

function startGame(){

document.getElementById("startScreen").style.display="none"

if(selectedChar == 1){
playerImg.src = "nhanvat1.gif"
}else{
playerImg.src = "nhanvat2.gif"
}

music.play()

game()
}

function game(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(mapImg,0,0,1280,720)

ctx.drawImage(playerImg,player.x,player.y,90,90)

if(!scroll.taken){
ctx.drawImage(scrollImg,scroll.x,scroll.y,60,60)
}

player.x += player.vx
player.y += player.vy

player.vy += 0.5

if(player.y > 500){
player.y = 500
player.vy = 0
player.jump=false
}

if(
player.x < scroll.x + 60 &&
player.x + 90 > scroll.x &&
player.y < scroll.y + 60 &&
player.y + 90 > scroll.y &&
!scroll.taken
){
scroll.taken = true
score++
document.getElementById("score").innerText = "Điểm: " + score
alert(questions[mapIndex])
}

requestAnimationFrame(game)
}

function holdLeft(){ player.vx = -6 }
function holdRight(){ player.vx = 6 }
function stopMove(){ player.vx = 0 }

function jump(){
if(!player.jump){
player.vy = -13
player.jump = true
}
}

document.getElementById("left").onmousedown = holdLeft
document.getElementById("left").onmouseup = stopMove

document.getElementById("right").onmousedown = holdRight
document.getElementById("right").onmouseup = stopMove

document.getElementById("jump").onmousedown = jump

document.getElementById("left").ontouchstart = holdLeft
document.getElementById("left").ontouchend = stopMove

document.getElementById("right").ontouchstart = holdRight
document.getElementById("right").ontouchend = stopMove

document.getElementById("jump").ontouchstart = jump

</script>

</body>
</html>
