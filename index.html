<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch Sử Việt Nam Pixel</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
image-rendering:pixelated;
}

.start{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
color:white;
}

.start img{
width:300px;
}

input{
padding:10px;
font-size:18px;
margin-top:10px;
}

button{
padding:14px;
font-size:18px;
margin-top:10px;
}

.controlsLeft{
position:fixed;
bottom:30px;
left:20px;
display:flex;
gap:20px;
}

.controlsRight{
position:fixed;
bottom:30px;
right:20px;
}

.ctrl{
width:70px;
height:70px;
font-size:28px;
border:none;
border-radius:15px;
background:black;
color:white;
opacity:0.8;
}

.scroll{
position:absolute;
width:60px;
}

</style>
</head>

<body>

<div class="start" id="start">

<img src="thongbao.png">

<input id="name" placeholder="Nhập tên">

<button onclick="startGame()">Bắt đầu</button>

</div>

<canvas id="game"></canvas>

<div class="controlsLeft">
<button class="ctrl" id="left">◀</button>
<button class="ctrl" id="right">▶</button>
</div>

<div class="controlsRight">
<button class="ctrl" id="jump">▲</button>
</div>

<audio id="music" loop>
<source src="amthanh.mp3" type="audio/mpeg">
</audio>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

screen.orientation.lock("landscape").catch(()=>{})

const maps = [
"thanhhoa.png",
"thanglong.png",
"batho.png",
"quoctugiam.png",
"thuathienhue.png",
"dienkinhthien.png",
"hoankiem.png",
"hoian.png",
"quangnam.png",
"dentho.png"
]

const questions = [
"Câu hỏi Thanh Hóa?",
"Câu hỏi Thăng Long?",
"Câu hỏi Ba Thợ?",
"Câu hỏi Quốc Tử Giám?",
"Câu hỏi Huế?",
"Câu hỏi Điện Kính Thiên?",
"Câu hỏi Hồ Hoàn Kiếm?",
"Câu hỏi Hội An?",
"Câu hỏi Quảng Nam?",
"Câu hỏi Đền Thờ?"
]

let mapIndex
let mapImg = new Image()

let playerImg = new Image()
playerImg.src = "nhanvat1.png"

let music = document.getElementById("music")

document.body.addEventListener("touchstart",()=>{
music.play()
},{once:true})

let player={
x:200,
y:320,
vy:0,
speed:5,
jump:false
}

let gravity=0.7
let scrollX=0

let scrollItem={
x:800,
y:320,
taken:false
}

function startGame(){

let name=document.getElementById("name").value
if(name==""){
alert("Nhập tên")
return
}

document.getElementById("start").style.display="none"

mapIndex=Math.floor(Math.random()*maps.length)
mapImg.src=maps[mapIndex]

game()

}

let left=false
let right=false

document.getElementById("left").ontouchstart=()=>left=true
document.getElementById("left").ontouchend=()=>left=false

document.getElementById("right").ontouchstart=()=>right=true
document.getElementById("right").ontouchend=()=>right=false

document.getElementById("jump").ontouchstart=()=>{
if(!player.jump){
player.vy=-14
player.jump=true
}
}

function game(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(mapImg,-scrollX,0,canvas.width*2,canvas.height)

ctx.drawImage(playerImg,player.x,player.y,80,80)

if(!scrollItem.taken){
ctx.fillStyle="gold"
ctx.fillRect(scrollItem.x-scrollX,scrollItem.y,40,40)
}

if(left) scrollX-=player.speed
if(right) scrollX+=player.speed

player.y+=player.vy
player.vy+=gravity

if(player.y>320){
player.y=320
player.jump=false
}

if(Math.abs(player.x+scrollX-scrollItem.x)<50 && !scrollItem.taken){
scrollItem.taken=true
openQuestion()
}

requestAnimationFrame(game)

}

function openQuestion(){
alert(questions[mapIndex])
}

</script>

</body>
</html>
