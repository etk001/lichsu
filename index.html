<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Lịch Sử</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

canvas{
display:block;
image-rendering: pixelated;
}

#menu{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
}

#menu input{
padding:10px;
font-size:18px;
}

#menu button{
padding:10px 20px;
margin:10px;
font-size:18px;
}

#scoreUI{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
}

#controls{
position:absolute;
bottom:10px;
width:100%;
display:flex;
justify-content:space-between;
}

.btn{
width:90px;
height:90px;
background:rgba(255,255,255,0.3);
border-radius:20px;
margin:10px;
}

#scroll{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#f5e6c8;
padding:30px;
border:5px solid #8b5a2b;
display:none;
max-width:80%;
font-size:20px;
}
</style>
</head>

<body>

<div id="menu">
<h1>Game Lịch Sử Việt Nam</h1>
<input id="playerName" placeholder="Nhập tên">
<div>
<button onclick="setChar(1)">Nhân vật Nam</button>
<button onclick="setChar(2)">Nhân vật Nữ</button>
</div>
<button onclick="startGame()">Bắt đầu</button>
</div>

<div id="scoreUI">Điểm: <span id="score">0</span></div>

<div id="scroll"></div>

<div id="controls">
<div>
<div class="btn" id="left"></div>
<div class="btn" id="right"></div>
</div>
<div>
<div class="btn" id="jump"></div>
</div>
</div>

<audio id="bgm" loop src="amthanh.mp3"></audio>
<audio id="correct" src="amthanh.mp3"></audio>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let player={
x:200,
y:300,
vy:0,
speed:6,
jump:false
}

let score=0

let charImg=new Image()
charImg.src="nhanvat1.gif"

function setChar(id){
if(id==1) charImg.src="nhanvat1.gif"
if(id==2) charImg.src="nhanvat2.gif"
}

const maps=[
{img:"thanhhoa.png",q:"Lê Lợi khởi nghĩa ở đâu?",a:"Thanh Hóa"},
{img:"thanglong.png",q:"Kinh đô Đại Việt thời Lê?",a:"Thăng Long"},
{img:"batho.png",q:"Bài thơ Nam Quốc Sơn Hà nói về điều gì?",a:"Chủ quyền"},
{img:"quoctugiam.png",q:"Trường đại học đầu tiên VN?",a:"Quốc Tử Giám"},
{img:"thuathienhue.jpg",q:"Kinh đô triều Nguyễn?",a:"Huế"},
{img:"dienkinhthien.png",q:"Nằm trong Hoàng thành?",a:"Điện Kính Thiên"},
{img:"hoankiem.jpg",q:"Hồ gắn với vua Lê Lợi?",a:"Hoàn Kiếm"},
{img:"hoian.jpg",q:"Thương cảng nổi tiếng?",a:"Hội An"},
{img:"quangnam.jpg",q:"Tỉnh có Hội An?",a:"Quảng Nam"},
{img:"dentho.png",q:"Nơi thờ vua?",a:"Đền"}
]

let mapIndex=0
let mapImg=new Image()

function randomMap(){
mapIndex=Math.floor(Math.random()*maps.length)
mapImg.src=maps[mapIndex].img
}

let left=false
let right=false

function setupControls(){
const L=document.getElementById("left")
const R=document.getElementById("right")
const J=document.getElementById("jump")

L.ontouchstart=()=>left=true
L.ontouchend=()=>left=false

R.ontouchstart=()=>right=true
R.ontouchend=()=>right=false

J.ontouchstart=()=>{
if(!player.jump){
player.vy=-15
player.jump=true
}
}
}

setupControls()

function startGame(){
document.getElementById("menu").style.display="none"
document.getElementById("bgm").play()
randomMap()
}

function update(){
if(left) player.x-=player.speed
if(right) player.x+=player.speed

player.y+=player.vy
player.vy+=1

if(player.y>300){
player.y=300
player.jump=false
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.drawImage(mapImg,0,0,canvas.width,canvas.height)
ctx.drawImage(charImg,player.x,player.y,90,90)

ctx.fillStyle="gold"
ctx.fillRect(700,320,40,40)

if(player.x>680 && player.x<760){
showQuestion()
}
}

function showQuestion(){
const scroll=document.getElementById("scroll")
scroll.style.display="block"
scroll.innerHTML=
maps[mapIndex].q +
"<br><button onclick='correctAnswer()'>Trả lời</button>"
}

function correctAnswer(){
document.getElementById("correct").play()
score++
document.getElementById("score").innerText=score
document.getElementById("scroll").style.display="none"
randomMap()
player.x=100
}

function gameLoop(){
update()
draw()
requestAnimationFrame(gameLoop)
}

gameLoop()
</script>

</body>
</html>
