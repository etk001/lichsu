<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Lịch Sử</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
image-rendering: pixelated;
}

#rotate{
position:absolute;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
z-index:10;
}

#menu{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
z-index:5;
}

#controls{
position:absolute;
bottom:10px;
width:100%;
display:flex;
justify-content:space-between;
}

.btn{
width:90px;
height:90px;
background:rgba(255,255,255,0.25);
border-radius:20px;
margin:10px;
}

#scroll{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#f5e6c8;
padding:30px;
border:6px solid #7a4f1f;
display:none;
font-size:20px;
max-width:80%;
}
</style>
</head>

<body>

<div id="rotate">Hãy xoay ngang điện thoại để chơi</div>

<div id="menu">
<h1>Game Lịch Sử</h1>
<input id="name" placeholder="Nhập tên">
<br>
<button onclick="setChar(1)">Nhân vật Nam</button>
<button onclick="setChar(2)">Nhân vật Nữ</button>
<br>
<button onclick="startGame()">Bắt đầu</button>
</div>

<div id="scroll"></div>

<div id="controls">
<div>
<div class="btn" id="left"></div>
<div class="btn" id="right"></div>
</div>
<div>
<div class="btn" id="jump"></div>
</div>
</div>

<audio id="bgm" loop src="amthanh.mp3"></audio>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.onresize=resize

function checkRotate(){
if(window.innerHeight>window.innerWidth){
document.getElementById("rotate").style.display="flex"
}else{
document.getElementById("rotate").style.display="none"
}
}
checkRotate()
window.onresize=checkRotate

let player={
x:200,
y:300,
vy:0,
speed:6,
jump:false
}

let charImg=new Image()
charImg.src="nhanvat1.gif"

function setChar(id){
if(id==1) charImg.src="nhanvat1.gif"
if(id==2) charImg.src="nhanvat2.gif"
}

const maps=[
"thanhhoa.png",
"thanglong.png",
"batho.png",
"quoctugiam.png",
"thuathienhue.jpg",
"dienkinhthien.png",
"hoankiem.jpg",
"hoian.jpg",
"quangnam.jpg",
"dentho.png"
]

let mapImg=new Image()

function randomMap(){
let m=maps[Math.floor(Math.random()*maps.length)]
mapImg.src=m
}
randomMap()

let left=false
let right=false

document.getElementById("left").ontouchstart=()=>left=true
document.getElementById("left").ontouchend=()=>left=false

document.getElementById("right").ontouchstart=()=>right=true
document.getElementById("right").ontouchend=()=>right=false

document.getElementById("jump").ontouchstart=()=>{
if(!player.jump){
player.vy=-15
player.jump=true
}
}

function startGame(){
document.getElementById("menu").style.display="none"
document.getElementById("bgm").play()
}

function update(){
if(left) player.x-=player.speed
if(right) player.x+=player.speed

player.y+=player.vy
player.vy+=1

if(player.y>canvas.height-150){
player.y=canvas.height-150
player.jump=false
}
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(mapImg,0,0,canvas.width,canvas.height)

/* FIX nền trắng nhân vật */
ctx.save()
ctx.globalCompositeOperation="source-over"
ctx.drawImage(charImg,player.x,player.y,90,90)
ctx.restore()

ctx.fillStyle="gold"
ctx.fillRect(canvas.width-200,canvas.height-120,40,40)

if(player.x>canvas.width-220){
showQuestion()
}
}

function showQuestion(){
let s=document.getElementById("scroll")
s.style.display="block"
s.innerHTML="Câu hỏi lịch sử<br><button onclick='nextMap()'>Trả lời</button>"
}

function nextMap(){
document.getElementById("scroll").style.display="none"
randomMap()
player.x=100
}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}
loop()

</script>
</body>
</html>
