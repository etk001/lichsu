<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Lịch Sử Pixel</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87CEEB;
}

canvas{
display:block;
image-rendering: pixelated;
}

.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
}

button{
font-size:24px;
padding:18px;
border:none;
border-radius:12px;
background:black;
color:white;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="controls">
<button id="left">◀</button>
<button id="jump">▲</button>
<button id="right">▶</button>
</div>

<audio id="music" autoplay loop>
<source src="snaptt.me-35221248.m4a" type="audio/mp4">
</audio>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let leftPressed=false
let rightPressed=false

let player={
x:100,
y:300,
w:40,
h:40,
vy:0,
speed:5,
jumping:false
}

const gravity=0.6

function drawGround(){
for(let i=0;i<4000;i+=40){
ctx.fillStyle="#4CAF50"
ctx.fillRect(i,350,40,40)
}
}

function drawPlayer(){
ctx.fillStyle="#ffcc99"
ctx.fillRect(player.x,player.y,player.w,player.h)
}

function game(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.save()
ctx.translate(-player.x+150,0)

drawGround()
drawPlayer()

ctx.restore()

if(leftPressed) player.x -= player.speed
if(rightPressed) player.x += player.speed

player.y += player.vy
player.vy += gravity

if(player.y>300){
player.y=300
player.jumping=false
}

requestAnimationFrame(game)
}

document.getElementById("left").ontouchstart=()=> leftPressed=true
document.getElementById("left").ontouchend=()=> leftPressed=false

document.getElementById("right").ontouchstart=()=> rightPressed=true
document.getElementById("right").ontouchend=()=> rightPressed=false

document.getElementById("jump").onclick=()=>{
if(!player.jumping){
player.vy=-12
player.jumping=true
}
}

window.addEventListener("load",()=>{
let music=document.getElementById("music")
music.play().catch(()=>{})
})

game()

</script>
</body>
</html>
