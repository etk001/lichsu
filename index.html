<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Pixel History Challenge</title>
<style>
body{
    background:#1b1f3a;
    color:white;
    font-family:monospace;
    text-align:center;
    margin-top:120px;
}
button{
    padding:12px 24px;
    font-size:18px;
    border:none;
    background:#ff4d4d;
    color:white;
    cursor:pointer;
}
button:hover{
    background:#ff2e2e;
}
#game{
    display:none;
    margin-top:30px;
}
.answer{
    display:block;
    margin:10px;
}
</style>
</head>
<body>

<h1>Pixel History Challenge</h1>
<button onclick="startGame()">Bắt đầu</button>

<div id="game">
<h2 id="question"></h2>
<div id="answers"></div>
<p id="result"></p>
</div>

<script>
const questions = [
{
q:"Ai là người đọc Tuyên ngôn Độc lập năm 1945?",
a:["Hồ Chí Minh","Võ Nguyên Giáp","Phan Bội Châu","Trần Hưng Đạo"],
correct:0
},
{
q:"Chiến thắng Điện Biên Phủ diễn ra năm nào?",
a:["1950","1954","1960","1975"],
correct:1
},
{
q:"Thăng Long đổi tên thành Hà Nội năm nào?",
a:["1831","1900","1945","1976"],
correct:0
}
];

let current = 0;

function startGame(){
document.querySelector("button").style.display="none";
document.getElementById("game").style.display="block";
showQuestion();
}

function showQuestion(){
let q = questions[current];
document.getElementById("question").innerText = q.q;
let html="";
q.a.forEach((ans,i)=>{
html += <button class="answer" onclick="checkAnswer(${i})">${ans}</button>;
});
document.getElementById("answers").innerHTML = html;
}

function checkAnswer(i){
if(i===questions[current].correct){
document.getElementById("result").innerText="Đúng!";
}else{
document.getElementById("result").innerText="Sai!";
}
current++;
if(current < questions.length){
setTimeout(()=>{
document.getElementById("result").innerText="";
showQuestion();
},1000);
}else{
setTimeout(()=>{
document.getElementById("game").innerHTML="<h2>Hoàn thành!</h2>";
},1000);
}
}
</script>

</body>
</html>
