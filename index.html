<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch Sử Việt Nam Pixel</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

canvas{
display:block;
image-rendering:pixelated;
}

.startScreen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
color:white;
}

button{
padding:12px 20px;
font-size:18px;
margin:8px;
}
</style>
</head>

<body>

<div class="startScreen" id="startScreen">

<img src="thongbao.png" width="300">

<br>

<input id="playerName" placeholder="Nhập tên">

<br>

<button onclick="selectCharacter(1)">Nhân vật 1</button>
<button onclick="selectCharacter(2)">Nhân vật 2</button>

</div>

<canvas id="game"></canvas>

<audio id="music" loop>
<source src="amthanh.mp3" type="audio/mpeg">
</audio>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

const music = document.getElementById("music")

document.body.addEventListener("touchstart",()=>{
music.play()
},{once:true})

let playerName=""
let character=null

const maps = [
"thanhhoa.png",
"thanglong.png",
"batho.png",
"quoctugiam.png",
"thuathienhue.png",
"dienkinhthien.png",
"hoankiem.png",
"hoian.png",
"quangnam.png",
"dentho.png"
]

const questions = [
"Câu hỏi 1",
"Câu hỏi 2",
"Câu hỏi 3",
"Câu hỏi 4",
"Câu hỏi 5",
"Câu hỏi 6",
"Câu hỏi 7",
"Câu hỏi 8",
"Câu hỏi 9",
"Câu hỏi 10"
]

let mapIndex = Math.floor(Math.random()*maps.length)

let mapImage = new Image()
mapImage.src = maps[mapIndex]

let playerImg = new Image()

function selectCharacter(id){

playerName = document.getElementById("playerName").value

if(playerName==""){
alert("Nhập tên trước")
return
}

if(id===1){
playerImg.src = "ChatGPT Image 18_08_54 1 thg 4, 2026.png"
}

document.getElementById("startScreen").style.display="none"

startGame()
}

let player = {
x:200,
y:300,
speed:4
}

let scrollX = 0

function startGame(){

gameLoop()

}

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(mapImage, -scrollX, 0, 2000, canvas.height)

ctx.drawImage(playerImg, player.x, player.y, 80, 80)

requestAnimationFrame(gameLoop)

}

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowRight"){
scrollX += player.speed
}

if(e.key==="ArrowLeft"){
scrollX -= player.speed
}

if(e.key===" "){
openScroll()
}

})

function openScroll(){

alert(questions[mapIndex])

}

</script>

</body>
</html>
