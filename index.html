<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Lịch Sử</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
image-rendering: pixelated;
}

#rotate{
position:absolute;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
z-index:20;
}

#menu{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
z-index:10;
}

#controls{
position:absolute;
bottom:0;
width:100%;
display:flex;
justify-content:space-between;
}

.btn{
width:90px;
height:90px;
background:rgba(255,255,255,0.25);
border-radius:20px;
margin:15px;
}

#scroll{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#f5e6c8;
padding:30px;
border:6px solid #7a4f1f;
display:none;
font-size:20px;
max-width:80%;
z-index:30;
}
</style>
</head>

<body>

<div id="rotate">Hãy xoay ngang điện thoại</div>

<div id="menu">
<h1>Game Lịch Sử</h1>
<input id="name" placeholder="Tên người chơi">
<br>
<button onclick="setChar(1)">Nhân vật Nam</button>
<button onclick="setChar(2)">Nhân vật Nữ</button>
<br>
<button onclick="startGame()">Bắt đầu</button>
</div>

<div id="scroll"></div>

<div id="controls">
<div>
<div class="btn" id="left"></div>
<div class="btn" id="right"></div>
</div>
<div>
<div class="btn" id="jump"></div>
</div>
</div>

<audio id="bgm" loop src="amthanh.mp3"></audio>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)

function checkRotate(){
if(window.innerHeight>window.innerWidth){
rotate.style.display="flex"
}else{
rotate.style.display="none"
}
}
checkRotate()
window.addEventListener("resize",checkRotate)

let player={
x:100,
y:0,
vy:0,
speed:7,
jump:false
}

let charImg=new Image()
charImg.src="nhanvat1.gif"

function setChar(id){
if(id==1) charImg.src="nhanvat1.gif"
if(id==2) charImg.src="nhanvat2.gif"
}

const maps=[
"thanhhoa.png",
"thanglong.png",
"batho.png",
"quoctugiam.png",
"thuathienhue.jpg",
"dienkinhthien.png",
"hoankiem.jpg",
"hoian.jpg",
"quangnam.jpg",
"dentho.png"
]

let mapImg=new Image()
let mapIndex=0

function randomMap(){
mapIndex=Math.floor(Math.random()*maps.length)
mapImg.src=maps[mapIndex]
}
randomMap()

let left=false
let right=false

/* MOBILE */
leftBtn=document.getElementById("left")
rightBtn=document.getElementById("right")
jumpBtn=document.getElementById("jump")

leftBtn.ontouchstart=()=>left=true
leftBtn.ontouchend=()=>left=false

rightBtn.ontouchstart=()=>right=true
rightBtn.ontouchend=()=>right=false

jumpBtn.ontouchstart=()=>{
if(!player.jump){
player.vy=-18
player.jump=true
}
}

/* PC */
document.addEventListener("keydown",(e)=>{
if(e.key==="a") left=true
if(e.key==="d") right=true
if(e.key==="w"){
if(!player.jump){
player.vy=-18
player.jump=true
}
}
})

document.addEventListener("keyup",(e)=>{
if(e.key==="a") left=false
if(e.key==="d") right=false
})

function startGame(){
menu.style.display="none"
document.getElementById("bgm").play()
}

function update(){

if(left) player.x-=player.speed
if(right) player.x+=player.speed

player.y+=player.vy
player.vy+=1

let ground=canvas.height-140

if(player.y>ground){
player.y=ground
player.jump=false
}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(mapImg,0,0,canvas.width,canvas.height)

ctx.drawImage(charImg,player.x,player.y,100,100)

let scrollX=canvas.width-250
let scrollY=canvas.height-150

ctx.fillStyle="gold"
ctx.fillRect(scrollX,scrollY,50,50)

if(
player.x+80>scrollX &&
player.x<scrollX+50 &&
player.y+80>scrollY
){
openQuestion()
}

}

function openQuestion(){
scroll.style.display="block"
scroll.innerHTML=
"Câu hỏi lịch sử<br><br><button onclick='nextMap()'>Trả lời</button>"
}

function nextMap(){
scroll.style.display="none"
randomMap()
player.x=100
}

function gameLoop(){
update()
draw()
requestAnimationFrame(gameLoop)
}
gameLoop()

</script>

</body>
</html>
