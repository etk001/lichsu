<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Lịch Sử Level 3</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}

canvas{
  display:block;
}

/* MENU */
#menu{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:10;
}

/* QUIZ */
#quiz{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#f5deb3;
  padding:20px;
  border-radius:10px;
  display:none;
  z-index:20;
}

/* MOBILE */
#controls{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
}

.btn{
  width:70px;
  height:70px;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
}
</style>
</head>

<body>

<div id="menu">
  <h1>Game Lịch Sử</h1>
  <input id="name" placeholder="Tên">
  <button onclick="selectChar(1)">Nam</button>
  <button onclick="selectChar(2)">Nữ</button>
  <button onclick="startGame()">Bắt đầu</button>
</div>

<div id="quiz">
  <p id="question"></p>
  <button onclick="answer(true)">✔</button>
  <button onclick="answer(false)">✖</button>
</div>

<canvas id="game"></canvas>

<div id="controls">
  <div>
    <div class="btn" ontouchstart="left=true" ontouchend="left=false"></div>
    <div class="btn" ontouchstart="right=true" ontouchend="right=false"></div>
  </div>
  <div class="btn" ontouchstart="jump=true" ontouchend="jump=false"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {
  x:100,
  y:300,
  w:60,
  h:60,
  dx:0,
  dy:0,
  onGround:false,
  direction:1
};

let gravity = 1;
let left=false,right=false,jump=false;

let scrollX=0;
let score=0;

let charImg = new Image();

let maps = [
"thanhhoa.png","thanglong.png","batho.png",
"quoctugiam.png","thuathienhue.jpg",
"dienkinhthien.png","hoankiem.jpg",
"hoian.jpg","quangnam.jpg","dentho.png"
];

let questions = [
"Đây là Thanh Hóa?",
"Đây là Thăng Long?",
"Đây là Bát Thọ?",
"Đây là Quốc Tử Giám?",
"Đây là Huế?",
"Đây là Điện Kính Thiên?",
"Đây là Hồ Hoàn Kiếm?",
"Đây là Hội An?",
"Đây là Quảng Nam?",
"Đây là Đền Thờ?"
];

let mapImg;
let currentQuestion;

function selectChar(n){
  charImg.src = n==1 ? "nhanvat1.gif" : "nhanvat2.gif";
}

function startGame(){
  document.getElementById("menu").style.display="none";

  let music = new Audio("amthanh.mp3");
  music.loop=true;
  music.play().catch(()=>{});

  loadMap();
}

function loadMap(){
  let i = Math.floor(Math.random()*maps.length);
  mapImg = new Image();
  mapImg.src = maps[i];
  currentQuestion = questions[i];

  player.x=100;
  player.y=300;
  scrollX=0;
}

function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.drawImage(mapImg,-scrollX,0,canvas.width,canvas.height);

  // điều khiển
  if(left){
    player.dx=-5;
    player.direction=-1;
  }
  else if(right){
    player.dx=5;
    player.direction=1;
  }
  else player.dx=0;

  if(jump && player.onGround){
    player.dy=-15;
    player.onGround=false;
  }

  player.dy+=gravity;
  player.x+=player.dx;
  player.y+=player.dy;

  // nền đất
  if(player.y>300){
    player.y=300;
    player.dy=0;
    player.onGround=true;
  }

  scrollX+=player.dx;

  // VẼ NHÂN VẬT (lật)
  ctx.save();
  ctx.translate(player.x,player.y);

  if(player.direction==-1){
    ctx.scale(-1,1);
    ctx.drawImage(charImg,-player.w,0,player.w,player.h);
  }else{
    ctx.drawImage(charImg,0,0,player.w,player.h);
  }

  ctx.restore();

  // PLATFORM
  ctx.fillStyle="green";
  ctx.fillRect(400-scrollX,250,120,20);
  ctx.fillRect(650-scrollX,200,120,20);

  // GAI
  ctx.fillStyle="red";
  ctx.fillRect(550-scrollX,320,50,20);

  // chết
  if(player.x > 550-scrollX && player.x < 600-scrollX && player.y>300){
    reset();
  }

  // CUỘN GIẤY
  let scrollObj = 900;
  ctx.fillStyle="yellow";
  ctx.fillRect(scrollObj-scrollX,280,40,40);

  if(player.x > scrollObj-scrollX-20){
    showQuestion();
  }

  ctx.fillStyle="white";
  ctx.fillText("Điểm: "+score,20,20);

  requestAnimationFrame(gameLoop);
}

function reset(){
  player.x=100;
  player.y=300;
  scrollX=0;
}

function showQuestion(){
  document.getElementById("quiz").style.display="block";
  document.getElementById("question").innerText=currentQuestion;
}

function answer(correct){
  document.getElementById("quiz").style.display="none";

  if(correct){
    new Audio("dung.mp3").play();
    score++;
    loadMap();
  }else{
    new Audio("sai.mp3").play();
    reset();
  }
}

gameLoop();
</script>

</body>
</html>
