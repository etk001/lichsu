<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Lịch Sử Pixel</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

/* Canvas */
canvas{
display:block;
image-rendering: pixelated;
}

/* MENU */
#menu{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:url("thongbao.png") center/cover;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:10;
}

input,select,button{
padding:10px;
margin:5px;
font-size:18px;
}

/* CONTROL MOBILE */
#controls{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:space-between;
padding:20px;
}

.btn{
width:60px;
height:60px;
background:rgba(255,255,255,0.3);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
}

/* QUIZ */
#quiz{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
z-index:20;
}

#scroll{
background:#f5deb3;
padding:20px;
border:4px solid brown;
border-radius:10px;
animation:roll 0.4s ease;
}

@keyframes roll{
from{transform:scale(0)}
to{transform:scale(1)}
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
<h2>Game Lịch Sử</h2>
<input id="name" placeholder="Nhập tên">
<select id="char">
<option value="1">Nhân vật Nam</option>
<option value="2">Nhân vật Nữ</option>
</select>
<button onclick="startGame()">Bắt đầu</button>
</div>

<canvas id="game"></canvas>

<!-- MOBILE -->
<div id="controls">
<div>
<div class="btn" ontouchstart="left=true" ontouchend="left=false">◀</div>
<div class="btn" ontouchstart="right=true" ontouchend="right=false">▶</div>
</div>
<div class="btn" ontouchstart="jump()">▲</div>
</div>

<!-- QUIZ -->
<div id="quiz">
<div id="scroll">
<p id="question"></p>
<button onclick="answer(true)">✔</button>
<button onclick="answer(false)">✖</button>
</div>
</div>

<audio id="music" src="amthanh.mp3" loop></audio>

<script>
const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

ctx.imageSmoothingEnabled = false

function resize(){
canvas.width = window.innerWidth
canvas.height = window.innerHeight
}
resize()
window.addEventListener("resize",resize)

/* PLAYER */
let player = {
x:100,
y:300,
vx:0,
vy:0,
img:null
}

let gravity = 0.8
let left=false, right=false

/* MAP (ĐÚNG FILE CỦA BẠN) */
const maps = [
"thanhhoa.png",
"thanglong.png",
"batho.png",
"quoctugiam.png",
"thuathienhue.jpg",
"dienkinhthien.png",
"hoankiem.jpg",
"hoian.jpg",
"quangnam.jpg",
"dentho.png"
]

/* CÂU HỎI */
const questions = [
"Đây là Thanh Hóa?",
"Đây là Thăng Long?",
"Đây là Bát Thọ?",
"Đây là Quốc Tử Giám?",
"Đây là Huế?",
"Đây là Điện Kính Thiên?",
"Hồ Hoàn Kiếm?",
"Hội An?",
"Quảng Nam?",
"Đền thờ?"
]

let mapIndex=0
let bg=new Image()

/* SCORE */
let score=0

/* LOAD MAP */
function loadMap(){
mapIndex = Math.floor(Math.random()*maps.length)
bg.src = "./"+maps[mapIndex]

bg.onerror=()=>console.log("Lỗi ảnh:",bg.src)

setTimeout(()=>{
document.getElementById("quiz").style.display="block"
document.getElementById("question").innerText = questions[mapIndex]
},1500)
}

/* START */
function startGame(){
document.getElementById("menu").style.display="none"

let char = document.getElementById("char").value

player.img = new Image()
player.img.src = char==1 ? "nhanvat1.gif" : "nhanvat2.gif"

loadMap()

// bật nhạc
let played=false
document.body.addEventListener("click",()=>{
if(!played){
document.getElementById("music").play()
played=true
}
})
}

/* ANSWER */
function answer(correct){
document.getElementById("quiz").style.display="none"

if(correct){
score++
loadMap()
}else{
alert("Sai!")
}
}

/* JUMP */
function jump(){
if(player.y>300){
player.vy=-15
}
}

/* GAME LOOP */
function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height)

// background
ctx.drawImage(bg,0,0,canvas.width,canvas.height)

// movement mượt
if(left) player.vx -=0.5
if(right) player.vx +=0.5
player.vx *=0.9

player.x += player.vx
player.y += player.vy
player.vy += gravity

if(player.y>300){
player.y=300
player.vy=0
}

// draw player (KHÔNG còn viền xấu nhiều)
if(player.img){
ctx.drawImage(player.img,player.x,player.y,96,96)
}

// score
ctx.fillStyle="white"
ctx.font="20px Arial"
ctx.fillText("Điểm: "+score,20,30)

requestAnimationFrame(loop)
}
loop()
</script>

</body>
</html>
