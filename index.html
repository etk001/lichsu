<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
overflow:hidden;
background:black;
touch-action:none;
}

/* canvas FULL */
canvas{
position:absolute;
width:100vw;
height:100vh;
image-rendering:pixelated;
}

/* xoay */
#rotate{
position:fixed;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
z-index:100;
}

/* menu */
#menu{
position:fixed;
width:100%;
height:100%;
background:url('manhinhchinh.png') center/cover;
z-index:200;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-end;
}

/* scroll chọn nhân vật */
#chars{
display:flex;
overflow-x:auto;
width:100%;
padding:20px;
}

.char{
width:80px;
margin:10px;
border:3px solid white;
flex-shrink:0;
}
</style>
</head>

<body>

<div id="rotate">Xoay ngang để chơi</div>

<div id="menu">
<div id="chars"></div>
<button onclick="start()">Bắt đầu</button>
</div>

<canvas id="game"></canvas>

<audio id="music" src="amthanh.mp3" loop></audio>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

/* ===== FULL MOBILE ===== */
function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

/* ===== XOAY ===== */
function checkRotate(){
rotate.style.display=(innerHeight>innerWidth)?"flex":"none";
}
checkRotate();
addEventListener("resize",checkRotate);

/* ===== NHÂN VẬT ===== */
let playerImg=new Image();
let totalFrame=4;
let frame=0;

let selected=1;

/* tạo 10 nhân vật */
for(let i=1;i<=10;i++){
let img=document.createElement("img");
img.src="play"+i+".png";
img.className="char";
img.onclick=()=>{selected=i;};
chars.appendChild(img);
}

/* ===== PLAYER ===== */
let player={
x:100,y:0,
vx:0,vy:0,
w:60,h:60,
onGround:false,
dir:1
};

/* ===== MAP RANDOM ===== */
let mapImg=new Image();

function loadMap(){
let i=Math.floor(Math.random()*10)+1;
mapImg.src="map"+i+".png";

/* trục random trên cao */
checkpoint = 600 + Math.random()*400;
}

/* ===== TRỤC ===== */
let scrollImg=new Image();
scrollImg.src="truc.png";
let checkpoint=800;

/* ===== PARKOUR ===== */
function createPlatforms(){
platforms=[];
let x=200;

for(let i=0;i<8;i++){
platforms.push({
x:x,
y:Math.random()*200+200,
w:120,
h:20
});
x+=150;
}
}

let platforms=[];

/* ===== GAME ===== */
let gravity=0.8;
let scrollX=0;

function ground(){
return canvas.height-50;
}

/* ===== LOOP ===== */
function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

/* MAP FULL */
ctx.drawImage(mapImg,-scrollX,0,canvas.width*2,canvas.height);

/* MOVE */
player.vx=0;
if(keys.left){player.vx=-5;player.dir=-1;}
if(keys.right){player.vx=5;player.dir=1;}

if(keys.jump && player.onGround){
player.vy=-14;
player.onGround=false;
new Audio("nhay.mp3").play();
}

player.vy+=gravity;
player.x+=player.vx;
player.y+=player.vy;

/* GROUND */
if(player.y+player.h>=ground()){
player.y=ground()-player.h;
player.vy=0;
player.onGround=true;
}

/* PLATFORM */
platforms.forEach(p=>{
let px=p.x-scrollX;

if(player.x+player.w>px &&
player.x<px+p.w &&
player.y+player.h>p.y &&
player.y+player.h<p.y+25 &&
player.vy>=0){
player.y=p.y-player.h;
player.vy=0;
player.onGround=true;
}
});

/* CAMERA */
scrollX+=player.vx;

/* DRAW PLATFORM */
ctx.fillStyle="green";
platforms.forEach(p=>{
ctx.fillRect(p.x-scrollX,p.y,p.w,p.h);
});

/* TRỤC TREO TRÊN CAO */
ctx.drawImage(scrollImg,checkpoint-scrollX,150,60,60);

/* PLAYER */
let fw=playerImg.width/totalFrame;
frame+=0.2;
if(frame>=totalFrame) frame=0;

ctx.drawImage(
playerImg,
Math.floor(frame)*fw,0,
fw,playerImg.height,
player.x,player.y,
player.w,player.h
);

requestAnimationFrame(loop);
}

/* ===== CONTROL ===== */
let keys={};
onkeydown=e=>{
if(e.key=="ArrowLeft")keys.left=true;
if(e.key=="ArrowRight")keys.right=true;
if(e.key==" ")keys.jump=true;
};
onkeyup=e=>{
if(e.key=="ArrowLeft")keys.left=false;
if(e.key=="ArrowRight")keys.right=false;
if(e.key==" ")keys.jump=false;
};

/* ===== START ===== */
function start(){
menu.style.display="none";
playerImg.src="play"+selected+".png";

loadMap();
createPlatforms();

music.play().catch(()=>{});
loop();
}
</script>

</body>
</html>
