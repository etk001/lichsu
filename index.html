<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Lịch Sử Pixel</title>

<style>
body {
margin: 0;
overflow: hidden;
background: black;
font-family: sans-serif;
}

/* Canvas */
canvas {
display: block;
margin: auto;
image-rendering: pixelated;
}

/* Menu */
#menu {
position: fixed;
top:0;
left:0;
width:100%;
height:100%;
background: url("thongbao.png") center/cover;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:10;
}

input, button {
padding:10px;
margin:5px;
font-size:18px;
}

/* Điều khiển mobile */
#controls {
position: fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:space-between;
padding:20px;
}

.btn {
width:60px;
height:60px;
background:rgba(255,255,255,0.3);
border-radius:50%;
font-size:24px;
display:flex;
align-items:center;
justify-content:center;
}

/* Popup câu hỏi */
#quiz {
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
display:none;
z-index:20;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
<h2>Game Lịch Sử</h2>
<input id="name" placeholder="Nhập tên">
<select id="char">
<option value="0">Nam</option>
<option value="1">Nữ</option>
</select>
<button onclick="startGame()">Bắt đầu</button>
</div>

<!-- GAME -->
<canvas id="game"></canvas>

<!-- MOBILE CONTROL -->
<div id="controls">
<div>
<div class="btn" ontouchstart="left=true" ontouchend="left=false">◀</div>
<div class="btn" ontouchstart="right=true" ontouchend="right=false">▶</div>
</div>
<div class="btn" ontouchstart="jump()">▲</div>
</div>

<!-- QUIZ -->
<div id="quiz">
<p id="question"></p>
<button onclick="answer(true)">Đúng</button>
<button onclick="answer(false)">Sai</button>
</div>

<audio id="music" src="amthanh.mp3" loop></audio>

<script>
const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let player = {
x:100,
y:300,
vx:0,
vy:0,
img:null
}

let gravity = 0.8
let left=false, right=false

/* MAP */
const maps = [
"thanhhoa.png",
"thanglong.png",
"batho.png",
"quoctugiam.png",
"thuathienhue.jpg",
"dienkinhthien.png",
"hoankiem.jpg",
"hoian.jpg",
"quangnam.jpg",
"dentho.png"
]

let mapIndex = 0
let bg = new Image()

/* CÂU HỎI */
const questions = [
"Đây là Thanh Hóa?", 
"Đây là Thăng Long?",
"Đây là Bát Thọ?",
"Đây là Quốc Tử Giám?",
"Đây là Huế?",
"Đây là Điện Kính Thiên?",
"Hồ Hoàn Kiếm?",
"Hội An?",
"Quảng Nam?",
"Đền thờ?"
]

/* FIX VIỀN TRẮNG NHÂN VẬT */
function drawPlayer(img,x,y){
ctx.drawImage(img,x,y,80,80)

// xoá nền trắng (hack đơn giản)
let imageData = ctx.getImageData(x,y,80,80)
let data = imageData.data

for(let i=0;i<data.length;i+=4){
let r=data[i], g=data[i+1], b=data[i+2]

// nếu gần trắng → cho trong suốt
if(r>240 && g>240 && b>240){
data[i+3]=0
}
}

ctx.putImageData(imageData,x,y)
}

/* START */
function startGame(){
document.getElementById("menu").style.display="none"

let char = document.getElementById("char").value
player.img = new Image()
player.img.src = char==0 ? "nhanvat1.gif" : "nhanvat2.gif"

loadMap()

// bật nhạc (mobile cần click)
document.body.onclick=()=>{
document.getElementById("music").play()
}
}

/* LOAD MAP */
function loadMap(){
mapIndex = Math.floor(Math.random()*maps.length)
bg.src = maps[mapIndex]

bg.onerror=()=>console.log("Lỗi ảnh:",bg.src)

// hiện câu hỏi sau 2s
setTimeout(()=>{
document.getElementById("quiz").style.display="block"
document.getElementById("question").innerText = questions[mapIndex]
},2000)
}

/* TRẢ LỜI */
function answer(correct){
document.getElementById("quiz").style.display="none"

if(correct){
alert("Đúng!")
loadMap()
}else{
alert("Sai!")
}
}

/* NHẢY */
function jump(){
if(player.y>300){
player.vy = -15
}
}

/* LOOP */
function gameLoop(){
ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(bg,0,0,canvas.width,canvas.height)

// di chuyển mượt
if(left) player.vx = -5
else if(right) player.vx = 5
else player.vx = 0

player.x += player.vx
player.y += player.vy
player.vy += gravity

if(player.y>300){
player.y=300
player.vy=0
}

// vẽ nhân vật
if(player.img) drawPlayer(player.img,player.x,player.y)

requestAnimationFrame(gameLoop)
}

gameLoop()
</script>

</body>
</html>
