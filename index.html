<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Lịch Sử Level 5</title>

<style>
body{margin:0;background:black;overflow:hidden;}
canvas{position:absolute;image-rendering:pixelated;}

#rotate{
position:fixed;width:100%;height:100%;
background:black;color:white;
display:flex;align-items:center;justify-content:center;
z-index:100;
}

#controls{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-between;
padding:20px;
}

.btn{
width:70px;height:70px;
background:rgba(255,255,255,0.3);
border-radius:50%;
}
#quiz{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:#f5deb3;
padding:20px;
display:none;
z-index:200;
}
</style>
</head>

<body>

<div id="rotate">Xoay ngang để chơi</div>

<canvas id="game"></canvas>

<div id="controls">
<div>
<div class="btn" id="left"></div>
<div class="btn" id="right"></div>
</div>
<div class="btn" id="jump"></div>
</div>

<div id="quiz"></div>

<audio id="music" src="amthanh.mp3" loop></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* FIX 16:9 */
function resize(){
let ratio=16/9;
let w=innerWidth,h=innerHeight;
if(w/h>ratio){
canvas.height=h;
canvas.width=h*ratio;
}else{
canvas.width=w;
canvas.height=w/ratio;
}
canvas.style.left=(w-canvas.width)/2+"px";
canvas.style.top=(h-canvas.height)/2+"px";
}
resize();
addEventListener("resize",resize);

/* xoay */
function checkRotate(){
rotate.style.display=(innerHeight>innerWidth)?"flex":"none";
}
checkRotate();
addEventListener("resize",checkRotate);

/* player */
let player={
x:100,y:300,vx:0,vy:0,ground:300,dir:1
};

let gravity=0.8;
let scrollX=0;
let score=0;

/* control */
let c={left:false,right:false,jump:false};

function bind(id,key){
let b=document.getElementById(id);
b.ontouchstart=()=>c[key]=true;
b.ontouchend=()=>c[key]=false;
b.onmousedown=()=>c[key]=true;
b.onmouseup=()=>c[key]=false;
}
bind("left","left");
bind("right","right");
bind("jump","jump");

/* ảnh */
const playerImg=new Image();
playerImg.src="nhanvat1.gif";

const maps=[
"thanhhoa.png","thanglong.png","batho.png",
"quoctugiam.png","thuathienhue.jpg",
"dienkinhthien.png","hoankiem.jpg",
"hoian.jpg","quangnam.jpg","dentho.png"
];

const questions=[
{
q:"Lê Lợi khởi nghĩa ở đâu?",
a:["Thanh Hóa","Huế","Hà Nội","Đà Nẵng"],
c:0
},
{
q:"Kinh đô xưa?",
a:["Huế","Thăng Long","Sài Gòn","Hội An"],
c:1
}
];

let mapImg=new Image();
let current;

/* load map */
function loadMap(){
let i=Math.floor(Math.random()*maps.length);
mapImg.src=maps[i];
current=questions[i%questions.length];

player.x=100;
scrollX=0;
}

/* quiz */
function showQuiz(){
quiz.style.display="block";
quiz.innerHTML="<h3>"+current.q+"</h3>";
current.a.forEach((ans,i)=>{
quiz.innerHTML+=`<button onclick="answer(${i})">${ans}</button>`;
});
}

function answer(i){
quiz.style.display="none";

if(i==current.c){
score++;
new Audio("dung.mp3").play();
loadMap();
}else{
new Audio("sai.mp3").play();
reset();
}
}

/* reset */
function reset(){
player.x=100;
player.y=300;
scrollX=0;
}

/* loop */
function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(!mapImg.complete){
ctx.fillStyle="white";
ctx.fillText("Loading...",50,50);
requestAnimationFrame(loop);
return;
}

/* map */
ctx.drawImage(mapImg,-scrollX,0,canvas.width,canvas.height);

/* movement */
player.vx=0;
if(c.left){player.vx=-5;player.dir=-1;}
if(c.right){player.vx=5;player.dir=1;}

if(c.jump && player.y>=player.ground){
player.vy=-15;
}

player.vy+=gravity;
player.y+=player.vy;
player.x+=player.vx;

if(player.y>player.ground){
player.y=player.ground;
player.vy=0;
}

/* camera */
scrollX+=player.vx;

/* platform */
ctx.fillStyle="green";
ctx.fillRect(400-scrollX,250,120,20);
ctx.fillRect(700-scrollX,200,120,20);

/* spike */
ctx.fillStyle="red";
ctx.fillRect(550-scrollX,320,50,20);
if(player.x>550-scrollX && player.x<600-scrollX && player.y>300){
reset();
}

/* scroll object */
let s=900;
ctx.fillStyle="yellow";
ctx.fillRect(s-scrollX,280,40,40);

if(player.x> s-scrollX-20){
showQuiz();
}

/* player draw */
ctx.save();
ctx.translate(player.x,player.y);
if(player.dir==-1){
ctx.scale(-1,1);
ctx.drawImage(playerImg,-80,0,80,80);
}else{
ctx.drawImage(playerImg,0,0,80,80);
}
ctx.restore();

/* UI */
ctx.fillStyle="white";
ctx.fillText("Điểm: "+score,20,20);

requestAnimationFrame(loop);
}
loop();

/* music */
document.body.addEventListener("click",()=>{
music.play();
},{once:true});

loadMap();
</script>

</body>
</html>
