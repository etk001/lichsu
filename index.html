<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Lịch Sử Level 4</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}

/* canvas căn giữa */
canvas{
position:absolute;
image-rendering:pixelated;
}

/* bắt xoay ngang */
#rotate{
position:fixed;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
z-index:50;
}

/* mobile control */
#controls{
position:fixed;
bottom:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:20px;
z-index:10;
}

.btn{
width:70px;
height:70px;
background:rgba(255,255,255,0.3);
border-radius:50%;
}
</style>
</head>

<body>

<div id="rotate">Xoay ngang điện thoại để chơi</div>

<canvas id="game"></canvas>

<div id="controls">
<div>
<div class="btn" id="left"></div>
<div class="btn" id="right"></div>
</div>
<div class="btn" id="jump"></div>
</div>

<audio id="music" src="amthanh.mp3" loop></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* 🔥 FIX TỈ LỆ 16:9 */
function resize(){
let ratio = 16/9;
let w = window.innerWidth;
let h = window.innerHeight;

if(w/h > ratio){
canvas.height = h;
canvas.width = h * ratio;
}else{
canvas.width = w;
canvas.height = w / ratio;
}

/* căn giữa */
canvas.style.left = (w - canvas.width)/2 + "px";
canvas.style.top = (h - canvas.height)/2 + "px";
}
resize();
window.addEventListener("resize", resize);

/* xoay ngang */
function checkRotate(){
if(window.innerHeight > window.innerWidth){
document.getElementById("rotate").style.display="flex";
}else{
document.getElementById("rotate").style.display="none";
}
}
checkRotate();
window.addEventListener("resize", checkRotate);

/* LOAD */
const playerImg = new Image();
playerImg.src="nhanvat1.gif";

const maps=[
"thanhhoa.png","thanglong.png","batho.png",
"quoctugiam.png","thuathienhue.jpg",
"dienkinhthien.png","hoankiem.jpg",
"hoian.jpg","quangnam.jpg","dentho.png"
];

let mapImg = new Image();
mapImg.src = maps[Math.floor(Math.random()*maps.length)];

let loaded=false;
mapImg.onload=()=>loaded=true;

/* PLAYER */
let player={
x:100,y:300,vx:0,vy:0,ground:300
};

let gravity=0.8;
let scrollX=0;

/* CONTROL */
let left=false,right=false,jump=false;

function hold(btn, key){
btn.addEventListener("touchstart",()=>window[key]=true);
btn.addEventListener("touchend",()=>window[key]=false);
}

hold(left,"left");
hold(right,"right");
hold(jump,"jump");

document.getElementById("left").onmousedown=()=>left=true;
document.getElementById("left").onmouseup=()=>left=false;

document.getElementById("right").onmousedown=()=>right=true;
document.getElementById("right").onmouseup=()=>right=false;

document.getElementById("jump").onmousedown=()=>jump=true;
document.getElementById("jump").onmouseup=()=>jump=false;

/* GAME LOOP */
function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* FIX MÀN ĐEN */
if(!loaded || !playerImg.complete){
ctx.fillStyle="white";
ctx.fillText("Đang tải...",50,50);
requestAnimationFrame(loop);
return;
}

/* MAP */
ctx.drawImage(mapImg,-scrollX,0,canvas.width,canvas.height);

/* MOVE */
player.vx=0;
if(left) player.vx=-5;
if(right) player.vx=5;

if(jump && player.y>=player.ground){
player.vy=-15;
}

player.vy+=gravity;
player.y+=player.vy;
player.x+=player.vx;

if(player.y>player.ground){
player.y=player.ground;
player.vy=0;
}

/* CAMERA */
scrollX+=player.vx;

/* PLAYER */
ctx.drawImage(playerImg,player.x,player.y,80,80);

/* UI */
ctx.fillStyle="white";
ctx.fillText("Level 4",20,20);

requestAnimationFrame(loop);
}
loop();

/* MUSIC */
document.body.addEventListener("click",()=>{
document.getElementById("music").play();
},{once:true});

</script>

</body>
</html>
