<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Lịch Sử</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

canvas{
display:block;
margin:auto;
background:black;
image-rendering: pixelated;
}

#startScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

#controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:20px;
}

.btn{
width:80px;
height:80px;
background:rgba(255,255,255,0.2);
border-radius:50%;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
user-select:none;
}

#score{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:20px;
}
</style>
</head>

<body>

<div id="startScreen">
<div style="text-align:center;color:white;">
<img src="thongbao.png" width="400"><br><br>
<input id="playerName" placeholder="Nhập tên"><br><br>
<button onclick="startGame()">Bắt đầu</button>
</div>
</div>

<div id="score">Điểm: 0</div>

<canvas id="game" width="1280" height="720"></canvas>

<div id="controls">
<div>
<div class="btn" id="left">◀</div>
<div class="btn" id="right">▶</div>
</div>
<div>
<div class="btn" id="jump">▲</div>
</div>
</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

const maps = [
"thanhhoa.png",
"thanglong.png",
"batho.png",
"quoctugiam.png",
"thuathienhue.jpg",
"dienkinhthien.png",
"hoankiem.jpg",
"hoian.jpg",
"quangnam.jpg",
"dentho.png"
]

const questions = [
"Câu hỏi 1",
"Câu hỏi 2",
"Câu hỏi 3",
"Câu hỏi 4",
"Câu hỏi 5",
"Câu hỏi 6",
"Câu hỏi 7",
"Câu hỏi 8",
"Câu hỏi 9",
"Câu hỏi 10"
]

let mapIndex = Math.floor(Math.random()*maps.length)

const mapImg = new Image()
mapImg.src = maps[mapIndex]

const playerImg = new Image()
playerImg.src = "nhanvat1.gif"

const scrollImg = new Image()
scrollImg.src = "thongbao.png"

const music = new Audio("amthanh.mp3")
music.loop = true

let score = 0

let player = {
x:200,
y:500,
width:80,
height:80,
vx:0,
vy:0,
jump:false
}

let scroll = {
x:900,
y:520,
width:60,
height:60,
taken:false
}

function startGame(){
document.getElementById("startScreen").style.display="none"
music.play()
game()
}

function game(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(mapImg,0,0,1280,720)

ctx.drawImage(playerImg,player.x,player.y,player.width,player.height)

if(!scroll.taken){
ctx.drawImage(scrollImg,scroll.x,scroll.y,scroll.width,scroll.height)
}

player.x += player.vx
player.y += player.vy

player.vy += 0.5

if(player.y > 500){
player.y = 500
player.vy = 0
player.jump=false
}

if(
player.x < scroll.x + scroll.width &&
player.x + player.width > scroll.x &&
player.y < scroll.y + scroll.height &&
player.y + player.height > scroll.y &&
!scroll.taken
){
scroll.taken = true
score++
document.getElementById("score").innerText = "Điểm: " + score
alert(questions[mapIndex])
}

requestAnimationFrame(game)
}

document.getElementById("left").ontouchstart=()=>player.vx=-5
document.getElementById("left").ontouchend=()=>player.vx=0

document.getElementById("right").ontouchstart=()=>player.vx=5
document.getElementById("right").ontouchend=()=>player.vx=0

document.getElementById("jump").ontouchstart=()=>{
if(!player.jump){
player.vy=-12
player.jump=true
}
}

document.getElementById("left").onmousedown=()=>player.vx=-5
document.getElementById("left").onmouseup=()=>player.vx=0

document.getElementById("right").onmousedown=()=>player.vx=5
document.getElementById("right").onmouseup=()=>player.vx=0

document.getElementById("jump").onmousedown=()=>{
if(!player.jump){
player.vy=-12
player.jump=true
}
}

</script>
</body>
</html>
