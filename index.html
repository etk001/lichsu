<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch Sử Việt Nam Pixel</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87c6ff;
font-family:sans-serif;
}

canvas{
display:block;
image-rendering: pixelated;
}

/* nút điều khiển điện thoại */
.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
}

button{
font-size:20px;
padding:15px 20px;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="controls">
<button onclick="moveLeft()">←</button>
<button onclick="jump()">↑</button>
<button onclick="moveRight()">→</button>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c6f1c7a7f.mp3">
</audio>

<script>
const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let player = {
x:100,
y:300,
w:40,
h:40,
vy:0,
jumping:false
}

let gravity = 0.8

let questionGate = {
x:800,
y:300,
w:50,
h:80
}

let asked = false

function drawPixelBackground(){
ctx.fillStyle="#5bbf5b"
ctx.fillRect(0,350,canvas.width,200)

ctx.fillStyle="#3aa33a"
for(let i=0;i<canvas.width;i+=40){
ctx.fillRect(i,330,20,20)
}
}

function drawPlayer(){
ctx.fillStyle="#ffcc99"
ctx.fillRect(player.x,player.y,player.w,player.h)
}

function drawGate(){
ctx.fillStyle="brown"
ctx.fillRect(questionGate.x,questionGate.y,questionGate.w,questionGate.h)
}

function game(){
ctx.clearRect(0,0,canvas.width,canvas.height)

drawPixelBackground()
drawGate()
drawPlayer()

player.y += player.vy
player.vy += gravity

if(player.y > 300){
player.y = 300
player.jumping=false
}

if(player.x + player.w > questionGate.x && !asked){
asked = true
askQuestion()
}

requestAnimationFrame(game)
}

function moveLeft(){
player.x -= 20
}

function moveRight(){
player.x += 20
}

function jump(){
if(!player.jumping){
player.vy = -15
player.jumping=true
}
}

function askQuestion(){
let q = prompt("Ai là người đánh bại quân Nam Hán trên sông Bạch Đằng?")

if(q && q.toLowerCase().includes("ngô quyền")){
alert("Đúng rồi! +5 điểm")
}else{
alert("Chưa đúng")
}
}

document.body.addEventListener("click",()=>{
document.getElementById("music").play()
})

game()
</script>

</body>
</html>
