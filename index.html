<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Lịch Sử Pixel</title>

<style>
html,body{
margin:0;
overflow:hidden;
background:black;
touch-action:none;
}

/* canvas */
canvas{
position:absolute;
image-rendering:pixelated;
}

/* bắt xoay ngang */
#rotate{
position:fixed;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
z-index:100;
}

/* menu */
#menu{
position:fixed;
width:100%;
height:100%;
z-index:200;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:url('manhinhchinh.png') center/cover;
}

/* chọn nhân vật */
.char{
width:100px;
margin:10px;
border:3px solid white;
}

/* control */
#controls{
position:fixed;
bottom:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:20px;
z-index:10;
}

.btn{
width:70px;
height:70px;
background:rgba(255,255,255,0.3);
border-radius:50%;
}

/* quiz */
#quiz{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#f5deb3;
padding:20px;
display:none;
z-index:300;
}
</style>
</head>

<body>

<div id="rotate">Xoay ngang để chơi</div>

<!-- MENU -->
<div id="menu">
<h2 style="color:white">Chọn nhân vật</h2>

<img src="play1.png" class="char" onclick="choose(1)">
<img src="play2.png" class="char" onclick="choose(2)">

<br>
<button onclick="start()">Bắt đầu</button>
</div>

<canvas id="game"></canvas>

<div id="controls">
<div>
<div class="btn" id="left"></div>
<div class="btn" id="right"></div>
</div>
<div class="btn" id="jump"></div>
</div>

<div id="quiz"></div>

<audio id="music" src="amthanh.mp3" loop></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* ===== FIX 16:9 ===== */
function resize(){
let ratio=16/9;
let w=innerWidth,h=innerHeight;

if(w/h>ratio){
canvas.height=h;
canvas.width=h*ratio;
}else{
canvas.width=w;
canvas.height=w/ratio;
}

canvas.style.left=(w-canvas.width)/2+"px";
canvas.style.top=(h-canvas.height)/2+"px";
}
resize();
addEventListener("resize",resize);

/* xoay ngang */
function checkRotate(){
rotate.style.display=(innerHeight>innerWidth)?"flex":"none";
}
checkRotate();
addEventListener("resize",checkRotate);

/* ===== CHỌN NHÂN VẬT ===== */
let playerImg=new Image();
let totalFrame=4;
let frame=0;
let frameSpeed=0.25;

function choose(n){
playerImg.src = (n==1)?"play1.png":"play2.png";
}

/* ===== PLAYER ===== */
let player={
x:100,y:0,
vx:0,vy:0,
w:70,h:70,
onGround:false,
dir:1
};

function ground(){
return canvas.height-70;
}

/* ===== CONTROL ===== */
let c={left:false,right:false,jump:false};

function bind(id,key){
let b=document.getElementById(id);
b.ontouchstart=()=>c[key]=true;
b.ontouchend=()=>c[key]=false;
b.onmousedown=()=>c[key]=true;
b.onmouseup=()=>c[key]=false;
}
bind("left","left");
bind("right","right");
bind("jump","jump");

/* ===== ÂM THANH ===== */
let jumpSound=new Audio("nhay.mp3");

/* ===== MAP ===== */
let mapImg=new Image();
mapImg.src="thanglong.png";

/* ===== TRỤC ===== */
let scrollImg=new Image();
scrollImg.src="truc.png";

/* ===== QUIZ ===== */
let question="Đây là Thăng Long?";
function showQuiz(){
quiz.style.display="block";
quiz.innerHTML=`
<p>${question}</p>
<button onclick="answer(true)">Đúng</button>
<button onclick="answer(false)">Sai</button>
`;
}

function answer(ok){
quiz.style.display="none";

if(ok){
new Audio("dung.mp3").play();
score++;
}else{
new Audio("sai.mp3").play();
reset();
}
}

/* ===== SCORE ===== */
let score=0;

/* ===== RESET ===== */
function reset(){
player.x=100;
player.y=0;
scrollX=0;
}

/* ===== PLATFORM ===== */
let platforms=[
{x:400,y:300,w:120,h:20},
{x:700,y:250,w:120,h:20}
];

/* ===== GAME ===== */
let gravity=0.8;
let scrollX=0;

/* DRAW PLAYER */
function drawPlayer(){

let fw = playerImg.width / totalFrame;

if(player.vx!=0){
frame+=frameSpeed;
if(frame>=totalFrame) frame=0;
}else{
frame=0;
}

let fx=Math.floor(frame)*fw;

ctx.save();
ctx.translate(player.x,player.y);

if(player.dir==-1){
ctx.scale(-1,1);
ctx.drawImage(playerImg,fx,0,fw,playerImg.height,-player.w,0,player.w,player.h);
}else{
ctx.drawImage(playerImg,fx,0,fw,playerImg.height,0,0,player.w,player.h);
}

ctx.restore();
}

/* LOOP */
function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(!mapImg.complete || !playerImg.complete){
ctx.fillStyle="white";
ctx.fillText("Loading...",50,50);
requestAnimationFrame(loop);
return;
}

/* map */
ctx.drawImage(mapImg,-scrollX,0,canvas.width,canvas.height);

/* move */
player.vx=0;
if(c.left){player.vx=-5;player.dir=-1;}
if(c.right){player.vx=5;player.dir=1;}

if(c.jump && player.onGround){
player.vy=-15;
player.onGround=false;
jumpSound.play();
}

player.vy+=gravity;
player.x+=player.vx;
player.y+=player.vy;

/* ground */
if(player.y+player.h>=ground()){
player.y=ground()-player.h;
player.vy=0;
player.onGround=true;
}

/* platform */
platforms.forEach(p=>{
let px=p.x-scrollX;

if(
player.x<px+p.w &&
player.x+player.w>px &&
player.y+player.h>p.y &&
player.y+player.h<p.y+20 &&
player.vy>=0
){
player.y=p.y-player.h;
player.vy=0;
player.onGround=true;
}
});

/* camera */
scrollX+=player.vx;

/* platform draw */
ctx.fillStyle="green";
platforms.forEach(p=>{
ctx.fillRect(p.x-scrollX,p.y,p.w,p.h);
});

/* trục */
let s=900;
ctx.drawImage(scrollImg,s-scrollX,ground()-40,40,40);

if(player.x > s-scrollX-20){
showQuiz();
}

/* player */
drawPlayer();

/* UI */
ctx.fillStyle="white";
ctx.fillText("Điểm: "+score,20,20);

requestAnimationFrame(loop);
}

/* START */
function start(){
menu.style.display="none";
music.play().catch(()=>{});
loop();
}
</script>

</body>
</html>
