<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
overflow:hidden;
background:black;
touch-action:none;
font-family:sans-serif;
}

canvas{
position:absolute;
width:100vw;
height:100vh;
image-rendering:pixelated;
}

/* menu */
#menu{
position:fixed;
width:100%;
height:100%;
background:url('manhinhchinh.png') center/cover;
display:flex;
flex-direction:column;
justify-content:flex-end;
z-index:200;
}

#chars{
display:flex;
overflow-x:auto;
padding:20px;
}

.char{
width:80px;
margin:10px;
border:3px solid white;
}

/* control */
#controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
z-index:50;
}

.btn{
width:70px;
height:70px;
background:rgba(255,255,255,0.3);
border-radius:50%;
}

/* quiz */
#quiz{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#f5deb3;
padding:20px;
display:none;
z-index:500;
}
</style>
</head>

<body>

<div id="menu">
<input id="playerName" placeholder="Nhập tên" style="margin:10px">
<div id="chars"></div>
<button onclick="start()">Bắt đầu</button>
</div>

<canvas id="game"></canvas>

<div id="controls">
<div>
<div class="btn" id="left"></div>
<div class="btn" id="right"></div>
<div class="btn" id="dash"></div>
</div>
<div class="btn" id="jump"></div>
</div>

<div id="quiz"></div>

<audio id="music" src="amthanh.mp3" loop></audio>

<script>
const canvas=game;
const ctx=canvas.getContext("2d");

/* resize */
function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
onresize=resize;

/* player */
let player={
x:100,y:0,
vx:0,vy:0,
w:60,h:60,
onGround:false,
dir:1
};

let playerImg=new Image();
let selected=1;

/* tạo nhân vật */
for(let i=1;i<=10;i++){
let img=document.createElement("img");
img.src="play"+i+".png";
img.className="char";
img.onclick=()=>selected=i;
chars.appendChild(img);
}

/* map */
let mapImg=new Image();
let scrollImg=new Image();
scrollImg.src="truc.png";

let scrollX=0;

/* câu hỏi */
let questions=[
{q:"Thăng Long là?",a:["Hà Nội","Huế","Đà Nẵng","Cần Thơ"],c:0},
{q:"Lê Lợi ở đâu?",a:["Thanh Hóa","Huế","HN","SG"],c:0}
];

let currentQ;

/* control */
let c={left:false,right:false,jump:false,dash:false};

function bind(id,key){
let b=document.getElementById(id);
b.ontouchstart=()=>c[key]=true;
b.ontouchend=()=>c[key]=false;
}
bind("left","left");
bind("right","right");
bind("jump","jump");
bind("dash","dash");

/* physics */
let gravity=0.7;

function ground(){
return canvas.height-50;
}

/* parkour */
let platforms=[];

function createPlatforms(){
platforms=[
{x:200,y:ground()-80,w:120,h:20},
{x:350,y:ground()-150,w:120,h:20},
{x:500,y:ground()-100,w:120,h:20},
{x:650,y:ground()-180,w:120,h:20},
{x:800,y:ground()-120,w:120,h:20}
];
}

/* trục */
function getScroll(){
let last=platforms[platforms.length-1];
return {x:last.x,y:last.y-70};
}

/* quiz */
function showQuiz(){
quiz.style.display="block";
quiz.innerHTML="<h3>"+currentQ.q+"</h3>";

currentQ.a.forEach((ans,i)=>{
quiz.innerHTML+=`<button onclick="answer(${i})">${ans}</button><br>`;
});
}

function answer(i){
quiz.style.display="none";

if(i==currentQ.c){
new Audio("dung.mp3").play();
loadMap();
}else{
new Audio("sai.mp3").play();
reset();
}
}

/* map */
function loadMap(){
let i=Math.floor(Math.random()*10)+1;
mapImg.src="map"+i+".png";

currentQ=questions[Math.floor(Math.random()*questions.length)];
createPlatforms();
reset();
}

/* reset */
function reset(){
player.x=100;
player.y=0;
scrollX=0;
}

/* loop */
function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

/* map lặp */
if(mapImg.width){
let ratio=mapImg.width/mapImg.height;
let mapW=canvas.height*ratio;

for(let i=-1;i<3;i++){
ctx.drawImage(mapImg,(i*mapW)-(scrollX%mapW),0,mapW,canvas.height);
}
}

/* move */
player.vx=0;

if(c.left){player.vx=-5;player.dir=-1;}
if(c.right){player.vx=5;player.dir=1;}
if(c.dash){player.vx*=2;}

if(c.jump && player.onGround){
player.vy=-15;
player.onGround=false;
new Audio("nhay.mp3").play();
}

/* gravity */
player.vy+=gravity;
player.x+=player.vx;
player.y+=player.vy;

/* chết */
if(player.y>canvas.height){
reset();
}

/* ground */
if(player.y+player.h>=ground()){
player.y=ground()-player.h;
player.vy=0;
player.onGround=true;
}

/* platform + bám mép */
platforms.forEach(p=>{
let px=p.x-scrollX;

if(player.x+player.w>px &&
player.x<px+p.w &&
player.y+player.h>p.y &&
player.y+player.h<p.y+30 &&
player.vy>=0){
player.y=p.y-player.h;
player.vy=0;
player.onGround=true;
}

/* bám mép */
if(
player.x+player.w>px &&
player.x<px+10 &&
player.y+player.h>p.y-20 &&
player.y<p.y
){
player.y=p.y-player.h;
}
});

/* camera */
scrollX+=player.vx;

/* draw platform */
ctx.fillStyle="green";
platforms.forEach(p=>{
ctx.fillRect(p.x-scrollX,p.y,p.w,p.h);
});

/* trục */
let s=getScroll();
ctx.drawImage(scrollImg,s.x-scrollX,s.y,60,60);

if(player.x>s.x-scrollX-20){
showQuiz();
}

/* player */
ctx.save();
if(player.dir==-1){
ctx.scale(-1,1);
ctx.drawImage(playerImg,-player.x-player.w,player.y,player.w,player.h);
}else{
ctx.drawImage(playerImg,player.x,player.y,player.w,player.h);
}
ctx.restore();

requestAnimationFrame(loop);
}

/* start */
function start(){
playerImg.src="play"+selected+".png";
menu.style.display="none";
music.play().catch(()=>{});
loadMap();
loop();
}
</script>

</body>
</html>
